<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Openings Page | Chess Arena</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

    <style>
        :root {
            --bg: #0f1115;
            --bg2: #16181d;
            --bg3: #1c1f26;
            --bg4: #232730;
            --border: #272a31;
            --border2: #343841;
            --text: #f1f5f9;
            --text2: #94a3b8;
            --text3: #64748b;
            --white: #ffffff;

            --p0: #f59e0b;
            /* Amber */
            --p1: #94a3b8;
            /* Slate */

            --sq-light: #b58863;
            --sq-dark: #6d4c2f;

            --eval-w: #f1f5f9;
            --eval-b: #1c1f26;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* ─── TOP NAV ─── */
        #topnav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 16px;
            background: var(--bg2);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            z-index: 50;
        }

        #topnav h1 {
            font-family: 'Orbitron';
            font-size: 1rem;
            letter-spacing: 4px;
            color: var(--text);
            text-transform: uppercase;
        }

        .nav-btn {
            font-family: 'Orbitron';
            font-size: 0.6rem;
            letter-spacing: 1px;
            padding: 7px 14px;
            border: 1px solid var(--border2);
            border-radius: 8px;
            background: var(--bg3);
            color: var(--text2);
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
        }

        .nav-btn:hover {
            background: var(--bg4);
            color: var(--text);
        }

        .nav-btn.primary {
            border-color: var(--p0);
            color: var(--p0);
        }

        .nav-btn.primary:hover {
            background: rgba(245, 158, 11, 0.1);
        }

        /* ─── MAIN LAYOUT ─── */
        .layout {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* ─── LEFT PANEL: DATABASE ─── */
        .side-panel {
            width: 320px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            background: var(--bg2);
            border-right: 1px solid var(--border);
            overflow: hidden;
        }

        .panel-header {
            padding: 15px;
            border-bottom: 1px solid var(--border);
            font-family: 'Orbitron';
            font-size: 0.8rem;
            letter-spacing: 1px;
            color: var(--text2);
        }

        .tabs {
            display: flex;
            border-bottom: 1px solid var(--border);
            background: var(--bg3);
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            background: none;
            border: none;
            color: var(--text3);
            font-family: 'Inter';
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            border-bottom: 2px solid transparent;
        }

        .tab-btn.active {
            color: var(--p0);
            border-bottom-color: var(--p0);
            background: var(--bg4);
        }

        .list-container {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .list-container::-webkit-scrollbar {
            width: 6px;
        }

        .list-container::-webkit-scrollbar-thumb {
            background: var(--border2);
            border-radius: 4px;
        }

        .list-item {
            padding: 12px;
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .list-item:hover {
            background: var(--bg4);
            border-color: var(--border2);
        }

        .list-item.active {
            border-color: var(--p0);
            background: rgba(245, 158, 11, 0.05);
        }

        .item-title {
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text);
        }

        .item-pgn {
            font-family: monospace;
            font-size: 0.7rem;
            color: var(--text3);
            margin-top: 4px;
        }

        .item-desc {
            font-size: 0.8rem;
            color: var(--text2);
            margin-top: 8px;
            line-height: 1.4;
            display: none;
        }

        .list-item.active .item-desc {
            display: block;
        }

        /* ─── CENTER: BOARD ─── */
        .center-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            gap: 20px;
            position: relative;
        }

        .board-container {
            display: flex;
            align-items: stretch;
            gap: 15px;
            background: var(--bg2);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .eval-bar {
            width: 12px;
            background: var(--eval-b);
            border-radius: 6px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            border: 1px solid var(--border2);
        }

        .eval-fill {
            width: 100%;
            height: 50%;
            background: var(--eval-w);
            transition: height 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .chessboard {
            width: 480px;
            height: 480px;
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            border: 2px solid var(--border2);
            border-radius: 4px;
            position: relative;
        }

        .square {
            width: 100%;
            height: 100%;
            position: relative;
            cursor: pointer;
        }

        .square.dark {
            background: var(--sq-dark);
        }

        .square.light {
            background: var(--sq-light);
        }

        .valid-move::after {
            content: '';
            position: absolute;
            width: 25%;
            height: 25%;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        .piece {
            position: absolute;
            width: 12.5%;
            height: 12.5%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 42px;
            transition: transform 0.25s cubic-bezier(0.25, 1, 0.5, 1);
            z-index: 10;
            user-select: none;
            font-family: 'Arial', sans-serif;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }

        .white-piece {
            color: var(--p0);
        }

        .black-piece {
            color: var(--p1);
        }

        .piece.captured {
            opacity: 0;
            transform: scale(0.5) !important;
        }

        /* ─── TIMELINE CONTROLS ─── */
        .controls-wrapper {
            width: 100%;
            max-width: 480px;
            background: var(--bg2);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .progress-bar {
            height: 4px;
            background: var(--bg4);
            border-radius: 2px;
            margin-bottom: 15px;
            position: relative;
        }

        .progress-fill {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            background: var(--p0);
            transition: width 0.3s;
        }

        .btn-row {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .btn-t {
            background: var(--bg3);
            border: 1px solid var(--border2);
            color: var(--text);
            width: 40px;
            height: 40px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-t:hover {
            background: var(--bg4);
            border-color: var(--p0);
            color: var(--p0);
        }

        .btn-t.play {
            width: 60px;
            font-size: 1.2rem;
        }

        .auto-btn {
            width: 100%;
            padding: 12px;
            background: var(--bg3);
            border: 1px solid var(--border2);
            color: var(--text2);
            font-family: 'Orbitron';
            font-size: 0.75rem;
            letter-spacing: 1px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
        }

        .auto-btn:hover {
            background: var(--bg4);
            color: var(--text);
        }

        .auto-btn.active {
            border-color: var(--p0);
            color: var(--p0);
            background: rgba(245, 158, 11, 0.05);
        }

        /* ─── RIGHT PANEL: TELEMETRY ─── */
        .telemetry-panel {
            width: 280px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            background: var(--bg2);
            border-left: 1px solid var(--border);
            padding: 15px;
            gap: 15px;
            overflow-y: auto;
        }

        .stat-card {
            background: var(--bg3);
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 6px;
        }

        .stat-label {
            font-size: 0.65rem;
            color: var(--text3);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .stat-value {
            font-family: 'Orbitron';
            font-size: 1.5rem;
            color: var(--text);
        }

        .stat-value.adv {
            color: var(--p0);
        }

        .engine-logs {
            flex: 1;
            background: #000;
            border: 1px solid var(--border2);
            border-radius: 6px;
            padding: 10px;
            font-family: monospace;
            font-size: 0.65rem;
            color: var(--text3);
            overflow-y: auto;
            min-height: 150px;
            line-height: 1.5;
        }

        .engine-logs span.hl {
            color: var(--p0);
        }

        /* RESPONSIVE */
        @media (max-width: 1000px) {
            .layout {
                flex-direction: column;
                overflow-y: auto;
            }

            .side-panel,
            .telemetry-panel {
                width: 100%;
                border: none;
                border-bottom: 1px solid var(--border);
            }

            .telemetry-panel {
                order: 3;
            }

            .center-area {
                order: 1;
                padding: 10px;
                width: 100%;
                box-sizing: border-box;
            }

            .side-panel {
                order: 2;
            }

            .board-container {
                width: 100%;
                max-width: 600px;
                margin: 0 auto;
                box-sizing: border-box;
                padding: 10px;
            }

            .chessboard {
                width: 100%;
                height: auto;
                aspect-ratio: 1;
            }

            .piece {
                font-size: clamp(24px, 7vw, 48px);
            }
        }
    </style>
</head>

<body>

    <div id="topnav">
        <div>
            <h1>CHESS ARENA</h1>
            <div id="game-subtitle">TRAINING & OPENINGS</div>
        </div>
        <div style="display: flex; gap: 10px;">
            <button class="nav-btn primary" onclick="toggleFullScreen()">FULLSCREEN</button>
            <button class="nav-btn" onclick="window.location.href='chesshome.html'">EXIT</button>
        </div>
    </div>

    <div class="layout">

        <!-- LEFT: DATABASE -->
        <div class="side-panel">
            <div class="panel-header">DATABASE DIRECTORY</div>
            <div class="tabs">
                <button class="tab-btn active" onclick="loadTab('openings', this)">OPENINGS</button>
                <button class="tab-btn" onclick="loadTab('gambits', this)">GAMBITS</button>
                <button class="tab-btn" onclick="loadTab('defenses', this)">DEFENSES</button>
            </div>
            <div class="list-container" id="mod-list"></div>
        </div>

        <!-- CENTER: BOARD -->
        <div class="center-area">

            <div class="board-container">
                <div class="eval-bar">
                    <div class="eval-fill" id="eval-fill"></div>
                </div>

                <div class="chessboard" id="board">
                    <!-- Squares injected via JS -->
                </div>
            </div>

            <div class="controls-wrapper">
                <div class="progress-bar">
                    <div class="progress-fill" id="t-progress" style="width: 0%"></div>
                </div>
                <div class="btn-row">
                    <button class="btn-t" onclick="prevMove()">⏮</button>
                    <button class="btn-t play" id="play-pause-btn" onclick="togglePlay()">▶</button>
                    <button class="btn-t" onclick="nextMove()">⏭</button>
                </div>
                <div style="display:flex; gap:10px; margin-top:10px; width: 100%;">
                    <button class="auto-btn" id="btn-taka-auto" onclick="toggleTakaAutoplay()" style="flex:1;">🤖 SIMULATE AI VS AI</button>
                    <button class="auto-btn" id="btn-play-vs-ai" onclick="togglePlayVsAI()" style="flex:1;">⚔ PLAY VS AI</button>
                </div>
            </div>

        </div>

        <!-- RIGHT: TELEMETRY -->
        <div class="telemetry-panel">
            <div class="panel-header" style="padding:0; border:none;">TAKA AI TELEMETRY</div>

            <div class="stat-card">
                <div class="stat-label">Evaluation</div>
                <div class="stat-value adv" id="eval-num">+0.00</div>
            </div>

            <div class="stat-card">
                <div class="stat-label">Current Depth</div>
                <div class="stat-value" id="eval-depth">0</div>
            </div>

            <div class="stat-card">
                <div class="stat-label">Optimal Continuation</div>
                <div class="stat-value" id="best-move-text" style="font-size:1rem; color:var(--text2);">--</div>
            </div>

            <div class="engine-logs" id="engine-logs">
                <div>> Initializing Taka AI...</div>
            </div>
        </div>

    </div>

    <script>
        // ─── DATA ───
        const MODULES = {
            openings: [
                { id: "o1", title: "Italian Game", moves: ["e4", "e5", "Nf3", "Nc6", "Bc4"], desc: "Aggressive central control aiming at the weak f7 pawn. A timeless classic." },
                { id: "o2", title: "Ruy Lopez", moves: ["e4", "e5", "Nf3", "Nc6", "Bb5"], desc: "The Spanish Torture. Puts direct pressure on the defender of the center." },
                { id: "o3", title: "Queen's Gambit", moves: ["d4", "d5", "c4"], desc: "White sacrifices a wing pawn to dominate the center. Leads to massive strategic depth." },
                { id: "o4", title: "English Opening", moves: ["c4"], desc: "Hypermodern flank attack controlling d5. Transposes into fierce positional battles." },
                { id: "o5", title: "Vienna Game", moves: ["e4", "e5", "Nc3"], desc: "Defends e4 while preparing f4 thrusts. Sharp, tactical, and dangerous." },
                { id: "o6", title: "Scotch Game", moves: ["e4", "e5", "Nf3", "Nc6", "d4"], desc: "White immediately challenges the center. Opens lines for rapid, open warfare." },
                { id: "o7", title: "Reti Opening", moves: ["Nf3", "d5", "c4"], desc: "Hypermodern system. White delays central pawn commitment, aiming to attack from the flanks." },
                { id: "o8", title: "Giuoco Piano", moves: ["e4", "e5", "Nf3", "Nc6", "Bc4", "Bc5"], desc: "The Quiet Game. Leads to slow maneuvering or sudden, explosive gambits." },
                { id: "o9", title: "London System", moves: ["d4", "d5", "Bf4"], desc: "Solid, universal system. White develops harmoniously without early clashes." },
                { id: "o10", title: "Catalan Opening", moves: ["d4", "Nf6", "c4", "e6", "g3"], desc: "Combines d4 and c4 with a kingside fianchetto. Positional, suffocating pressure." },
                { id: "o11", title: "Nimzo-Indian", moves: ["d4", "Nf6", "c4", "e6", "Nc3", "Bb4"], desc: "Hypermodern approach fighting for the center without placing pawns there immediately." },
                { id: "o12", title: "Slav Defense", moves: ["d4", "d5", "c4", "c6"], desc: "Solid pawn structure supporting the center against the Queen's Gambit." },
                { id: "o13", title: "Grünfeld Defense", moves: ["d4", "Nf6", "c4", "g6", "Nc3", "d5"], desc: "Hypermodern counterattack. Black lets White build a center to attack it." },
                { id: "o14", title: "Benoni Defense", moves: ["d4", "Nf6", "c4", "c5", "d5"], desc: "Sharp, asymmetrical positions. Black seeks active piece play immediately." },
                { id: "o15", title: "Dutch Defense", moves: ["d4", "f5"], desc: "Aggressive response to d4, aiming for kingside control." }
            ],
            gambits: [
                { id: "g1", title: "King's Gambit", moves: ["e4", "e5", "f4"], desc: "Romantic era madness. White sacrifices the f-pawn for absolute central dominance and attacks." },
                { id: "g2", title: "Evans Gambit", moves: ["e4", "e5", "Nf3", "Nc6", "Bc4", "Bc5", "b4"], desc: "Captain Evans' creation. Sacrifices a pawn for a devastating initiative." },
                { id: "g3", title: "Smith-Morra", moves: ["e4", "c5", "d4", "cxd4", "c3"], desc: "The ultimate weapon against the Sicilian. Sacs a pawn for massive developmental lead." },
                { id: "g4", title: "Danish Gambit", moves: ["e4", "e5", "d4", "exd4", "c3"], desc: "Two pawns given away for two lasers (bishops) cutting across the board." },
                { id: "g5", title: "Halloween Gambit", moves: ["e4", "e5", "Nf3", "Nc6", "Nc3", "Nf6", "Nxe5"], desc: "White sacrifices a knight on move 4 for a sweeping center attack. Insanely aggressive." },
                { id: "g6", title: "Budapest Gambit", moves: ["d4", "Nf6", "c4", "e5"], desc: "Black sacrifices an e-pawn immediately to disrupt White's development." }
            ],
            defenses: [
                { id: "d1", title: "Sicilian Defense", moves: ["e4", "c5"], desc: "Black fights for the center asynchronously. The most combative response to e4." },
                { id: "d2", title: "Caro-Kann", moves: ["e4", "c6", "d4", "d5"], desc: "An iron-clad defense. Solid pawn structure ready to counter-strike." },
                { id: "d3", title: "French Defense", moves: ["e4", "e6", "d4", "d5"], desc: "Closed, claustrophobic, but highly resilient. Black challenges the center immediately." },
                { id: "d4", title: "King's Indian", moves: ["d4", "Nf6", "c4", "g6", "Nc3", "Bg7"], desc: "Allows White a massive center, only to tear it down with terrifying flank attacks." },
                { id: "d5", title: "Pirc Defense", moves: ["e4", "d6", "d4", "Nf6", "Nc3", "g6"], desc: "Hypermodern and flexible. The dark-squared bishop becomes a sniper on g7." },
                { id: "d6", title: "Alekhine's Defense", moves: ["e4", "Nf6"], desc: "Provocative hypermodern opening. Black lures White's pawns forward to overextend them." },
                { id: "d7", title: "Modern Defense", moves: ["e4", "g6", "d4", "Bg7"], desc: "Flexible fianchetto system. Black allows White a broad center." }
            ]
        };

        // ─── STATE ───
        const chess = new Chess();
        const boardEl = document.getElementById('board');
        let currentSequence = [];
        let moveIndex = 0;
        let isPlaying = false;
        let playInterval = null;
        let piecesDOM = [];
        
        let isPlayingVsAI = false;
        let selectedSquare = null;

        // ─── INITIALIZATION ───
        function init() {
            createBoard();
            loadTab('openings');
            initStockfish();
        }

        // ─── FULLSCREEN ───
        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => console.log(err));
            } else {
                if (document.exitFullscreen) { document.exitFullscreen(); }
            }
        }

        // ─── UI / DIRECTORY ───
        function loadTab(cat, btnEl) {
            if (btnEl) {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btnEl.classList.add('active');
            }

            const listEl = document.getElementById('mod-list');
            listEl.innerHTML = '';

            MODULES[cat].forEach(mod => {
                const div = document.createElement('div');
                div.className = 'list-item';
                div.innerHTML = `
                    <div class="item-title">${mod.title}</div>
                    <div class="item-pgn">${mod.moves.join(' ')}</div>
                    <div class="item-desc">${mod.desc}</div>
                `;
                div.onclick = () => selectModule(mod, div);
                listEl.appendChild(div);
            });

            // Auto select first
            listEl.firstChild.click();
        }

        function selectModule(mod, el) {
            document.querySelectorAll('.list-item').forEach(d => d.classList.remove('active'));
            el.classList.add('active');

            pausePlay();
            if (isTakaPlaying) toggleTakaAutoplay();

            currentSequence = mod.moves;
            moveIndex = 0;
            selectedSquare = null;
            chess.reset();
            updateBoard();
            updateTimeline();

            analyzePosition();
        }

        // ─── BOARD ───
        function createBoard() {
            boardEl.innerHTML = '';
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const sq = document.createElement('div');
                    sq.className = `square ${(r + c) % 2 === 1 ? 'dark' : 'light'}`;
                    const file = String.fromCharCode(97 + c);
                    const rank = 8 - r;
                    const sqId = `${file}${rank}`;
                    sq.dataset.sq = sqId;
                    sq.onclick = () => handleSquareClick(sqId);
                    boardEl.appendChild(sq);
                }
            }
        }

        function updateBoard() {
            // Clear old pieces
            piecesDOM.forEach(p => p.el.remove());
            piecesDOM = [];

            const symbols = { 'p': '♟', 'n': '♞', 'b': '♝', 'r': '♜', 'q': '♛', 'k': '♚' };
            const board = chess.board();

            // Get valid moves if a square is selected
            let validMoves = [];
            if (selectedSquare) {
                const moves = chess.moves({ square: selectedSquare, verbose: true });
                validMoves = moves.map(m => m.to);
            }

            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const file = String.fromCharCode(97 + c);
                    const rank = 8 - r;
                    const sqName = `${file}${rank}`;
                    
                    // Clear and set highlight
                    const sqDiv = boardEl.querySelector(`.square[data-sq="${sqName}"]`);
                    if (sqDiv) {
                        sqDiv.style.boxShadow = (sqName === selectedSquare) ? 'inset 0 0 0 3px var(--p0)' : '';
                        if (validMoves.includes(sqName)) {
                            sqDiv.classList.add('valid-move');
                        } else {
                            sqDiv.classList.remove('valid-move');
                        }
                    }

                    const sq = board[r][c];
                    if (sq) {
                        const pEl = document.createElement('div');
                        pEl.className = `piece ${sq.color === 'w' ? 'white-piece' : 'black-piece'}`;
                        pEl.textContent = symbols[sq.type];
                        pEl.style.transform = `translate(${c * 100}%, ${r * 100}%)`;
                        pEl.style.pointerEvents = 'none'; // let clicks pass through to the square
                        boardEl.appendChild(pEl);
                        piecesDOM.push({ el: pEl, r, c });
                    }
                }
            }
        }

        // ─── TIMELINE CONTROLS ───
        function updateTimeline() {
            const pct = currentSequence.length === 0 ? 0 : (moveIndex / currentSequence.length) * 100;
            document.getElementById('t-progress').style.width = pct + '%';
        }

        function nextMove() {
            if (moveIndex < currentSequence.length) {
                const move = currentSequence[moveIndex];
                chess.move(move);
                moveIndex++;
                updateBoard();
                updateTimeline();
                analyzePosition();
            } else {
                pausePlay();
            }
        }

        function prevMove() {
            if (moveIndex > 0) {
                chess.undo();
                moveIndex--;
                updateBoard();
                updateTimeline();
                analyzePosition();
            }
        }

        function togglePlay() {
            const btn = document.getElementById('play-pause-btn');
            if (isPlaying) { pausePlay(); }
            else {
                if (moveIndex >= currentSequence.length) {
                    chess.reset(); moveIndex = 0; updateBoard(); updateTimeline();
                }
                isPlaying = true;
                btn.textContent = '⏸';
                btn.style.color = 'var(--p0)';

                nextMove(); // do first move immediately
                playInterval = setInterval(nextMove, 1500);
            }
        }

        function pausePlay() {
            isPlaying = false;
            clearInterval(playInterval);
            const btn = document.getElementById('play-pause-btn');
            btn.textContent = '▶';
            btn.style.color = 'var(--text)';
        }

        // ─── TAKA AUTO PLAY & PLAY VS AI ───
        let isTakaPlaying = false;
        let takaInterval = null;

        function toggleTakaAutoplay() {
            isTakaPlaying = !isTakaPlaying;
            const btn = document.getElementById('btn-taka-auto');
            if (isTakaPlaying) {
                if (isPlayingVsAI) togglePlayVsAI(); // disable human vs ai
                pausePlay();
                btn.classList.add('active');
                btn.textContent = '🤖 SIMULATING MATCH...';
                if (!chess.game_over()) analyzePosition();
            } else {
                btn.classList.remove('active');
                btn.textContent = '🤖 SIMULATE AI VS AI';
                clearTimeout(takaInterval);
            }
        }

        function togglePlayVsAI() {
            isPlayingVsAI = !isPlayingVsAI;
            const btn = document.getElementById('btn-play-vs-ai');
            if (isPlayingVsAI) {
                if (isTakaPlaying) toggleTakaAutoplay(); // disable auto
                pausePlay();
                btn.classList.add('active');
                btn.textContent = '⚔ AI MATCH ACTIVE';
                selectedSquare = null;
                updateBoard();
                if (chess.turn() === 'b' && !chess.game_over()) analyzePosition(); // If it's black's turn, AI moves
            } else {
                btn.classList.remove('active');
                btn.textContent = '⚔ PLAY VS AI';
                selectedSquare = null;
                updateBoard();
            }
        }

        function handleSquareClick(sq) {
            if (!isPlayingVsAI || chess.game_over()) return;

            const piece = chess.get(sq);
            if (selectedSquare) {
                // Attempt Move
                let result = chess.move({ from: selectedSquare, to: sq, promotion: 'q' });
                if (result) {
                    selectedSquare = null;
                    
                    if (moveIndex < currentSequence.length && result.san === currentSequence[moveIndex]) {
                        moveIndex++; // User stayed in book
                    } else {
                        moveIndex = currentSequence.length; // User deviated from book
                    }
                    
                    updateBoard();
                    updateTimeline();
                    checkGameOver();
                    
                    if (!chess.game_over()) {
                        setTimeout(analyzePosition, 100);
                    }
                } else {
                    // Invalid move or picking another piece
                    if (piece && piece.color === chess.turn()) {
                        selectedSquare = sq;
                        updateBoard();
                    } else {
                        selectedSquare = null;
                        updateBoard();
                    }
                }
            } else {
                if (piece && piece.color === chess.turn()) {
                    selectedSquare = sq;
                    updateBoard();
                }
            }
        }

        function checkGameOver() {
            if (chess.game_over()) {
                let msg = "Game Over!";
                if (chess.in_checkmate()) {
                    msg = chess.turn() === 'w' ? "Black wins by Checkmate!" : "White wins by Checkmate!";
                } else if (chess.in_draw()) {
                    msg = "Game Drawn!";
                } else if (chess.in_stalemate()) {
                    msg = "Stalemate!";
                }
                setTimeout(() => alert(msg), 300);
                
                if (isPlayingVsAI) togglePlayVsAI();
                if (isTakaPlaying) toggleTakaAutoplay();
            }
        }

        // ─── TAKA AI (ENGINE) ───
        let stockfish = null;
        let analyzeTimer = null;

        function logEngine(msg) {
            const el = document.getElementById('engine-logs');
            const div = document.createElement('div');
            div.innerHTML = msg;
            el.appendChild(div);
            el.scrollTop = el.scrollHeight;
        }

        function initStockfish() {
            try {
                const sfBlob = new Blob([`importScripts("https://cdnjs.cloudflare.com/ajax/libs/stockfish.js/10.0.0/stockfish.js");`], { type: 'application/javascript' });
                stockfish = new Worker(URL.createObjectURL(sfBlob));

                stockfish.onmessage = function (e) {
                    const line = e.data;

                    if (line.includes('info depth') && line.includes('score cp')) {
                        const cpMatch = line.match(/score cp (-?\d+)/);
                        const depthMatch = line.match(/depth (\d+)/);
                        if (cpMatch) {
                            let cp = parseInt(cpMatch[1]);
                            if (chess.turn() === 'b') cp = -cp;
                            updateTelemetry(cp, depthMatch ? depthMatch[1] : null);
                        }
                    }
                    if (line.includes('bestmove')) {
                        const parts = line.split(' ');
                        const move = parts[1];
                        document.getElementById('best-move-text').textContent = move || 'N/A';
                        logEngine(`> Evaluated best move: <span class="hl">${move}</span>`);

                        // Autoplay Loop
                        if (isTakaPlaying && move && move !== '(none)') {
                            takaInterval = setTimeout(() => {
                                if (chess.game_over()) { toggleTakaAutoplay(); return; }

                                // Safely format the move for chess.js
                                let promo = undefined;
                                if (move.length > 4) promo = move[4];

                                const moveObj = {
                                    from: move.substring(0, 2),
                                    to: move.substring(2, 4)
                                };
                                if (promo) moveObj.promotion = promo;

                                const result = chess.move(moveObj);

                                if (!result) {
                                    chess.move(move, { sloppy: true });
                                }

                                currentSequence.push(move);
                                moveIndex++;
                                updateBoard();
                                updateTimeline();
                                analyzePosition(); // Trigger next move evaluation
                            }, 500); // Small visual delay
                        } 
                        // Vs AI Loop
                        else if (isPlayingVsAI && move && move !== '(none)') {
                            setTimeout(() => {
                                if (chess.game_over()) return;
                                
                                // Play Opening Book Move if available
                                if (moveIndex < currentSequence.length) {
                                    const bookMove = currentSequence[moveIndex];
                                    chess.move(bookMove);
                                    moveIndex++;
                                    updateBoard();
                                    updateTimeline();
                                    checkGameOver();
                                    return;
                                }
                                
                                // Otherwise play engine move
                                let promo = undefined;
                                if (move.length > 4) promo = move[4];
                                
                                const moveObj = { from: move.substring(0, 2), to: move.substring(2, 4) };
                                if (promo) moveObj.promotion = promo;

                                const result = chess.move(moveObj);
                                if (!result) chess.move(move, {sloppy: true});

                                updateBoard();
                                checkGameOver();
                            }, 200);
                        }
                    }
                };
                stockfish.postMessage('uci');
                logEngine('Taka Engine <span class="hl">ONLINE</span>');
            } catch (e) {
                logEngine('Engine initialization failed.');
            }
        }

        function analyzePosition() {
            if (!stockfish) return;
            clearTimeout(analyzeTimer);

            document.getElementById('best-move-text').textContent = 'Thinking...';

            analyzeTimer = setTimeout(() => {
                stockfish.postMessage('stop');
                stockfish.postMessage('position fen ' + chess.fen());
                stockfish.postMessage('go movetime 1000');
            }, 50);
        }

        function updateTelemetry(cp, depth) {
            // Eval number
            const el = document.getElementById('eval-num');
            const val = (cp / 100).toFixed(2);
            el.textContent = (cp > 0 ? '+' : '') + val;
            el.className = 'stat-value ' + (cp > 0 ? 'adv' : '');

            // Depth
            if (depth) document.getElementById('eval-depth').textContent = depth;

            // Gauge bar logic
            const fill = document.getElementById('eval-fill');
            let pct = 100 / (1 + Math.exp(-0.0035 * cp));
            if (pct < 5) pct = 5; if (pct > 95) pct = 95;
            fill.style.height = pct + '%';
        }

        window.onload = init;
    </script>
</body>

</html>
