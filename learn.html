<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Training Simulator | Chess Arena</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Bebas+Neue&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    
    <style>
        :root {
            /* Cyber-Arena Palette */
            --bg-void: #020304;
            --bg-grid: #080a0f;
            --bg-panel: rgba(10, 13, 20, 0.65);
            
            --neon-blue: #00f0ff;
            --neon-blue-dim: rgba(0, 240, 255, 0.15);
            --neon-green: #00ff66;
            --neon-green-dim: rgba(0, 255, 102, 0.15);
            --neon-red: #ff003c;
            --neon-pink: #ff00a0;
            
            --txt-main: #e0e5ec;
            --txt-muted: #6b778d;
            --border-glow: rgba(0, 240, 255, 0.3);
            
            --font-head: 'Bebas Neue', sans-serif;
            --font-ui: 'Syne', sans-serif;
            --font-mono: 'Space Mono', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: var(--font-ui);
            background: var(--bg-void);
            color: var(--txt-main);
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* ─── BACKGROUND FX ─── */
        .bg-fx {
            position: fixed; inset: 0; pointer-events: none; z-index: -1;
            background-image: 
                linear-gradient(rgba(0, 240, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 240, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            background-position: center;
        }
        .bg-fx::after {
            content: ''; position: absolute; inset: 0;
            background: radial-gradient(circle at 50% 30%, rgba(0, 240, 255, 0.05) 0%, var(--bg-void) 70%);
        }
        .scanlines {
            position: fixed; inset: 0; z-index: 1000; pointer-events: none; opacity: 0.05;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, #000 2px, #000 4px);
        }

        /* ─── HEADER ─── */
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 40px; position: relative; z-index: 10;
            border-bottom: 1px solid rgba(0, 240, 255, 0.1);
            background: linear-gradient(90deg, rgba(0,0,0,0.8), transparent, rgba(0,0,0,0.8));
        }
        .brand {
            font-family: var(--font-head); font-size: 2.5rem; letter-spacing: 0.1em;
            color: #fff; text-shadow: 0 0 10px var(--neon-blue); position: relative;
        }
        .brand::after { content: 'SIMULATOR'; position: absolute; top: 100%; left: 0; font-family: var(--font-mono); font-size: 0.6rem; color: var(--neon-blue); letter-spacing: 0.4em; }
        .btn-exit {
            background: transparent; border: 1px solid var(--border-glow); color: var(--neon-blue);
            padding: 10px 24px; font-family: var(--font-mono); font-size: 0.8rem; letter-spacing: 0.1em;
            text-transform: uppercase; cursor: pointer; transition: 0.3s;
            clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
        }
        .btn-exit:hover { background: var(--neon-blue-dim); box-shadow: 0 0 15px var(--neon-blue-dim); }

        /* ─── MAIN LAYOUT ─── */
        .hud-grid {
            display: grid; grid-template-columns: 350px 1fr 300px; gap: 30px;
            max-width: 1600px; margin: 0 auto; padding: 40px; width: 100%; flex: 1; position: relative; z-index: 5;
        }

        /* ─── PANELS ─── */
        .panel {
            background: var(--bg-panel); backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.05);
            border-top: 2px solid var(--neon-blue);
            padding: 24px; position: relative;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            display: flex; flex-direction: column; gap: 20px;
        }
        .panel::before {
            content: ''; position: absolute; top: 0; left: 0; width: 30px; height: 30px;
            border-top: 2px solid var(--neon-blue); border-left: 2px solid var(--neon-blue); pointer-events: none;
        }
        .panel::after {
            content: ''; position: absolute; bottom: 0; right: 0; width: 30px; height: 30px;
            border-bottom: 2px solid var(--neon-blue); border-right: 2px solid var(--neon-blue); pointer-events: none; opacity: 0.3;
        }
        
        .panel-title {
            font-family: var(--font-mono); font-size: 0.85rem; color: var(--neon-blue);
            letter-spacing: 0.1em; text-transform: uppercase; border-bottom: 1px dashed rgba(255,255,255,0.1); padding-bottom: 10px;
            display: flex; justify-content: space-between;
        }

        /* ─── LEFT: DIRECTORY ─── */
        .category-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
        .cat-btn {
            background: none; border: 1px solid rgba(255,255,255,0.1); color: var(--txt-muted);
            padding: 6px 12px; font-family: var(--font-ui); font-size: 0.75rem; font-weight: 700;
            cursor: pointer; transition: 0.3s; border-radius: 4px;
        }
        .cat-btn:hover { color: #fff; border-color: rgba(255,255,255,0.3); }
        .cat-btn.active { background: var(--neon-blue-dim); color: var(--neon-blue); border-color: var(--neon-blue); }

        .module-list {
            display: flex; flex-direction: column; gap: 10px; overflow-y: auto; flex: 1; padding-right: 10px;
        }
        .module-list::-webkit-scrollbar { width: 4px; }
        .module-list::-webkit-scrollbar-thumb { background: var(--neon-blue); }

        .module-item {
            padding: 16px; border: 1px solid rgba(255,255,255,0.05); background: rgba(0,0,0,0.4);
            cursor: pointer; transition: 0.3s; position: relative; overflow: hidden;
        }
        .module-item:hover { border-color: rgba(0,240,255,0.5); transform: translateX(5px); }
        .module-item.active { border-color: var(--neon-blue); background: linear-gradient(90deg, var(--neon-blue-dim), transparent); }
        .module-item.active::before { content: '>'; position: absolute; left: 8px; top: 16px; color: var(--neon-blue); font-family: var(--font-mono); font-weight: bold; }
        
        .mod-title { font-family: var(--font-head); font-size: 1.5rem; color: #fff; letter-spacing: 0.05em; transition: 0.3s; }
        .module-item.active .mod-title { color: var(--neon-blue); padding-left: 15px; }
        .mod-pgn { font-family: var(--font-mono); font-size: 0.7rem; color: var(--txt-muted); margin-top: 4px; }
        .mod-desc { font-size: 0.85rem; color: #a0aabf; line-height: 1.5; margin-top: 10px; display: none; }
        .module-item.active .mod-desc { display: block; animation: fadeDown 0.3s ease forwards; }

        @keyframes fadeDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        /* ─── CENTER: HOLOGRAPHIC BOARD ─── */
        .center-stage { display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        
        .huge-bg-text {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-family: var(--font-head); font-size: 20rem; color: rgba(255,255,255,0.01);
            pointer-events: none; white-space: nowrap; z-index: -1;
        }

        .board-wrapper {
            display: flex; gap: 20px; align-items: stretch;
            background: rgba(0,0,0,0.6); padding: 30px; border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 0 50px rgba(0,240,255,0.05);
        }

        /* Vertical Eval Bar */
        .eval-gauge {
            width: 14px; background: #111; border-radius: 10px; overflow: hidden; position: relative;
            border: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; justify-content: flex-end;
        }
        .eval-fill {
            width: 100%; height: 50%; background: #fff; transition: height 0.6s cubic-bezier(0.16,1,0.3,1);
            box-shadow: 0 0 10px rgba(255,255,255,0.5);
        }
        .eval-gauge::after { content: ''; position: absolute; top: 50%; left: 0; right: 0; height: 1px; background: rgba(255,0,0,0.5); z-index: 2; }

        .chessboard {
            width: 500px; height: 500px;
            display: grid; grid-template-columns: repeat(8, 1fr); grid-template-rows: repeat(8, 1fr);
            position: relative; overflow: hidden;
            border: 2px solid rgba(0, 240, 255, 0.4);
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.2), inset 0 0 20px rgba(0, 240, 255, 0.1);
        }
        
        .square { width: 100%; height: 100%; position: relative; }
        .square.dark { background: rgba(0, 240, 255, 0.08); }
        .square.light { background: rgba(0,0,0,0.4); }
        
        /* Grid Coordinates overlay */
        .square::before {
            content: attr(data-coord); position: absolute; bottom: 2px; right: 2px;
            font-family: var(--font-mono); font-size: 8px; color: rgba(255,255,255,0.2); pointer-events: none;
        }

        .piece {
            position: absolute; width: 12.5%; height: 12.5%;
            display: flex; justify-content: center; align-items: center;
            font-size: 42px; transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            z-index: 10; user-select: none; font-family: 'Arial', sans-serif;
            text-shadow: 0 10px 20px rgba(0,0,0,0.8);
        }
        
        .white-piece { color: #ffffff; text-shadow: 0 0 10px rgba(0, 240, 255, 0.8), 0 5px 10px rgba(0,0,0,0.9); }
        .black-piece { color: #1a1c23; text-shadow: 0 0 8px rgba(255, 0, 60, 0.6), 0 5px 10px rgba(0,0,0,0.9); }
        .piece.captured { opacity: 0; transform: scale(0) !important; }

        /* ─── TIMELINE CONTROLS ─── */
        .timeline {
            margin-top: 30px; width: 100%; max-width: 500px;
            display: flex; flex-direction: column; gap: 15px;
        }
        .timeline-track-wrap { position: relative; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; }
        .timeline-progress { position: absolute; top:0; left:0; height: 100%; background: var(--neon-blue); transition: width 0.3s; box-shadow: 0 0 10px var(--neon-blue); }
        
        .ctrl-btns { display: flex; justify-content: center; gap: 15px; }
        .t-btn {
            background: transparent; border: 1px solid rgba(255,255,255,0.2); color: #fff;
            width: 45px; height: 45px; border-radius: 50%; font-size: 1.2rem;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.3s;
        }
        .t-btn:hover { border-color: var(--neon-blue); color: var(--neon-blue); background: var(--neon-blue-dim); box-shadow: 0 0 15px var(--neon-blue-dim); }
        .t-btn:active { transform: scale(0.9); }
        .t-btn.play-btn { width: 60px; height: 60px; font-size: 1.5rem; border-color: var(--neon-blue); color: var(--neon-blue); }

        /* ─── RIGHT: TELEMETRY (AI) ─── */
        .telemetry-data { display: flex; flex-direction: column; gap: 20px; }
        
        .stat-box { background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.05); padding: 15px; }
        .stat-label { font-family: var(--font-mono); font-size: 0.7rem; color: var(--txt-muted); margin-bottom: 5px; text-transform: uppercase; }
        .stat-val { font-family: var(--font-head); font-size: 2.5rem; color: #fff; letter-spacing: 0.05em; }
        .stat-val.positive { color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue-dim); }
        .stat-val.negative { color: var(--neon-red); text-shadow: 0 0 10px rgba(255,0,60,0.2); }

        .engine-logs {
            background: #050608; border: 1px solid rgba(255,255,255,0.05); padding: 15px; height: 180px;
            overflow-y: auto; font-family: var(--font-mono); font-size: 0.65rem; color: #4a5568;
            display: flex; flex-direction: column; gap: 5px;
        }
        .engine-logs span.highlight { color: var(--neon-blue); }

        .best-move-display {
            font-family: var(--font-mono); font-size: 1.2rem; text-align: center;
            padding: 20px; border: 1px dashed var(--border-glow); background: var(--neon-blue-dim);
            color: #fff; font-weight: bold;
        }

        .btn-premium-ai {
            width: 100%; max-width: 300px; padding: 15px; border-radius: 8px;
            background: linear-gradient(135deg, rgba(255,0,160,0.2), rgba(0,240,255,0.1));
            border: 1px solid var(--neon-pink);
            color: #fff; font-family: var(--font-head); font-size: 1.4rem; letter-spacing: 0.1em;
            cursor: pointer; transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(255,0,160,0.15), inset 0 0 10px rgba(255,0,160,0.1);
            text-shadow: 0 0 8px rgba(255,0,160,0.8);
        }
        .btn-premium-ai:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(255,0,160,0.3), inset 0 0 15px rgba(255,0,160,0.2);
            background: linear-gradient(135deg, rgba(255,0,160,0.3), rgba(0,240,255,0.2));
        }
        .btn-premium-ai.active {
            border-color: var(--neon-green);
            background: linear-gradient(135deg, rgba(0,255,102,0.2), rgba(0,240,255,0.1));
            box-shadow: 0 0 20px rgba(0,255,102,0.2), inset 0 0 10px rgba(0,255,102,0.1);
            text-shadow: 0 0 8px rgba(0,255,102,0.8);
            animation: pulse-green 2s infinite;
        }
        @keyframes pulse-green {
            0%, 100% { box-shadow: 0 0 20px rgba(0,255,102,0.2); }
            50% { box-shadow: 0 0 40px rgba(0,255,102,0.4); }
        }

        /* ─── RESPONSIVE ─── */
        @media (max-width: 1200px) {
            .hud-grid { grid-template-columns: 1fr 300px; }
            .center-stage { grid-column: 1 / -1; order: -1; }
        }
        @media (max-width: 800px) {
            .hud-grid { grid-template-columns: 1fr; }
            .chessboard { width: 100%; height: auto; aspect-ratio: 1; }
            .board-wrapper { padding: 15px; gap: 10px; }
        }
    </style>
</head>
<body>

    <div class="bg-fx"></div>
    <div class="scanlines"></div>

    <header>
        <div class="brand">CHESS</div>
        <div style="display:flex; gap:15px;">
            <button class="btn-exit" onclick="toggleFullScreen()" style="color:var(--neon-green); border-color:var(--neon-green);">FULLSCREEN</button>
            <button class="btn-exit" onclick="window.location.href='chesshome.html'">ABORT SESSION</button>
        </div>
    </header>

    <div class="hud-grid">
        
        <!-- MODULES LIST -->
        <div class="panel">
            <div class="panel-title"><span>SYS.DB //</span> <span>MODULES</span></div>
            
            <div class="category-tabs">
                <button class="cat-btn active" onclick="loadCategory('openings')">OPENINGS</button>
                <button class="cat-btn" onclick="loadCategory('gambits')">GAMBITS</button>
                <button class="cat-btn" onclick="loadCategory('defenses')">DEFENSES</button>
            </div>

            <div class="module-list" id="mod-list">
                <!-- Injected via JS -->
            </div>
        </div>

        <!-- HOLOGRAPHIC BOARD -->
        <div class="center-stage">
            <div class="huge-bg-text" id="bg-text">e4</div>
            
            <div class="board-wrapper">
                <div class="eval-gauge">
                    <div class="eval-fill" id="eval-fill"></div>
                </div>
                
                <div class="chessboard" id="board">
                    <!-- Squares injected via JS -->
                </div>
            </div>

            <div class="timeline">
                <div class="timeline-track-wrap">
                    <div class="timeline-progress" id="t-progress" style="width: 0%"></div>
                </div>
                <div class="ctrl-btns">
                    <button class="t-btn" onclick="prevMove()">⏮</button>
                    <button class="t-btn play-btn" id="play-pause-btn" onclick="togglePlay()">▶</button>
                    <button class="t-btn" onclick="nextMove()">⏭</button>
                </div>
                <div style="margin-top:20px; text-align:center;">
                    <button id="btn-taka-auto" class="btn-premium-ai" onclick="toggleTakaAutoplay()">TAKA AI AUTO-PLAY</button>
                </div>
            </div>
        </div>

        <!-- TELEMETRY / AI -->
        <div class="panel">
            <div class="panel-title"><span>TELEMETRY //</span> <span style="color:var(--neon-green)">ONLINE</span></div>
            
            <div class="telemetry-data">
                <div class="stat-box">
                    <div class="stat-label">Taka AI Evaluation</div>
                    <div class="stat-val positive" id="eval-num">+0.00</div>
                </div>
                
                <div class="stat-box">
                    <div class="stat-label">Search Depth</div>
                    <div class="stat-val" id="eval-depth" style="font-size: 1.5rem">0</div>
                </div>

                <div class="best-move-display">
                    <div style="font-size: 0.6rem; color: var(--neon-blue); margin-bottom: 5px;">OPTIMAL CONTINUATION</div>
                    <span id="best-move-text">--</span>
                </div>

                <div class="engine-logs" id="engine-logs">
                    <div>Engine initializing...</div>
                </div>
            </div>
        </div>

    </div>

    <script>
        // ─── DATA ───
        const MODULES = {
            openings: [
                { id: "o1", title: "Italian Game", moves: ["e4", "e5", "Nf3", "Nc6", "Bc4"], desc: "Aggressive central control aiming at the weak f7 pawn. A timeless classic." },
                { id: "o2", title: "Ruy Lopez", moves: ["e4", "e5", "Nf3", "Nc6", "Bb5"], desc: "The Spanish Torture. Puts direct pressure on the defender of the center." },
                { id: "o3", title: "Queen's Gambit", moves: ["d4", "d5", "c4"], desc: "White sacrifices a wing pawn to dominate the center. Leads to massive strategic depth." },
                { id: "o4", title: "English Opening", moves: ["c4"], desc: "Hypermodern flank attack controlling d5. Transposes into fierce positional battles." },
                { id: "o5", title: "Vienna Game", moves: ["e4", "e5", "Nc3"], desc: "Defends e4 while preparing f4 thrusts. Sharp, tactical, and dangerous." },
                { id: "o6", title: "Scotch Game", moves: ["e4", "e5", "Nf3", "Nc6", "d4"], desc: "White immediately challenges the center. Opens lines for rapid, open warfare." },
                { id: "o7", title: "Reti Opening", moves: ["Nf3", "d5", "c4"], desc: "Hypermodern system. White delays central pawn commitment, aiming to attack from the flanks." },
                { id: "o8", title: "Giuoco Piano", moves: ["e4", "e5", "Nf3", "Nc6", "Bc4", "Bc5"], desc: "The Quiet Game. Leads to slow maneuvering or sudden, explosive gambits." },
                { id: "o9", title: "London System", moves: ["d4", "d5", "Bf4"], desc: "Solid, universal system. White develops harmoniously without early clashes." },
                { id: "o10", title: "Catalan Opening", moves: ["d4", "Nf6", "c4", "e6", "g3"], desc: "Combines d4 and c4 with a kingside fianchetto. Positional, suffocating pressure." }
            ],
            gambits: [
                { id: "g1", title: "King's Gambit", moves: ["e4", "e5", "f4"], desc: "Romantic era madness. White sacrifices the f-pawn for absolute central dominance and attacks." },
                { id: "g2", title: "Evans Gambit", moves: ["e4", "e5", "Nf3", "Nc6", "Bc4", "Bc5", "b4"], desc: "Captain Evans' creation. Sacrifices a pawn for a devastating initiative." },
                { id: "g3", title: "Smith-Morra", moves: ["e4", "c5", "d4", "cxd4", "c3"], desc: "The ultimate weapon against the Sicilian. Sacs a pawn for massive developmental lead." },
                { id: "g4", title: "Danish Gambit", moves: ["e4", "e5", "d4", "exd4", "c3"], desc: "Two pawns given away for two lasers (bishops) cutting across the board." }
            ],
            defenses: [
                { id: "d1", title: "Sicilian Defense", moves: ["e4", "c5"], desc: "Black fights for the center asynchronously. The most combative response to e4." },
                { id: "d2", title: "Caro-Kann", moves: ["e4", "c6", "d4", "d5"], desc: "An iron-clad defense. Solid pawn structure ready to counter-strike." },
                { id: "d3", title: "French Defense", moves: ["e4", "e6", "d4", "d5"], desc: "Closed, claustrophobic, but highly resilient. Black challenges the center immediately." },
                { id: "d4", title: "King's Indian", moves: ["d4", "Nf6", "c4", "g6", "Nc3", "Bg7"], desc: "Allows White a massive center, only to tear it down with terrifying flank attacks." },
                { id: "d5", title: "Pirc Defense", moves: ["e4", "d6", "d4", "Nf6", "Nc3", "g6"], desc: "Hypermodern and flexible. The dark-squared bishop becomes a sniper on g7." }
            ]
        };

        // ─── STATE ───
        const chess = new Chess();
        const boardEl = document.getElementById('board');
        let currentSequence = [];
        let moveIndex = 0;
        let isPlaying = false;
        let playInterval = null;
        let piecesDOM = [];

        // ─── INITIALIZATION ───
        function init() {
            createBoard();
            loadCategory('openings');
            initStockfish();
        }

        // ─── UI / DIRECTORY ───
        function loadCategory(cat) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            event && event.target.classList.add('active');
            
            const listEl = document.getElementById('mod-list');
            listEl.innerHTML = '';
            
            MODULES[cat].forEach(mod => {
                const div = document.createElement('div');
                div.className = 'module-item';
                div.innerHTML = `
                    <div class="mod-title">${mod.title}</div>
                    <div class="mod-pgn">${mod.moves.join(' ')}</div>
                    <div class="mod-desc">${mod.desc}</div>
                `;
                div.onclick = () => selectModule(mod, div);
                listEl.appendChild(div);
            });
            
            // Auto select first
            listEl.firstChild.click();
        }

        function selectModule(mod, el) {
            document.querySelectorAll('.module-item').forEach(d => d.classList.remove('active'));
            el.classList.add('active');
            
            pausePlay();
            currentSequence = mod.moves;
            moveIndex = 0;
            chess.reset();
            updateBoard();
            updateTimeline();
            
            document.getElementById('bg-text').textContent = mod.moves[0];
            analyzePosition();
        }

        // ─── BOARD ───
        function createBoard() {
            boardEl.innerHTML = '';
            const files = ['a','b','c','d','e','f','g','h'];
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const sq = document.createElement('div');
                    sq.className = `square ${(r + c) % 2 === 1 ? 'dark' : 'light'}`;
                    sq.setAttribute('data-coord', files[c] + (8-r));
                    boardEl.appendChild(sq);
                }
            }
        }

        function updateBoard() {
            // Clear old pieces
            piecesDOM.forEach(p => p.el.remove());
            piecesDOM = [];

            const symbols = { 'p': '♟', 'n': '♞', 'b': '♝', 'r': '♜', 'q': '♛', 'k': '♚' };
            const board = chess.board();
            
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const sq = board[r][c];
                    if (sq) {
                        const pEl = document.createElement('div');
                        pEl.className = `piece ${sq.color === 'w' ? 'white-piece' : 'black-piece'}`;
                        pEl.textContent = symbols[sq.type];
                        pEl.style.transform = `translate(${c * 100}%, ${r * 100}%)`;
                        boardEl.appendChild(pEl);
                        piecesDOM.push({ el: pEl, r, c });
                    }
                }
            }
        }

        // ─── TIMELINE CONTROLS ───
        function updateTimeline() {
            const pct = currentSequence.length === 0 ? 0 : (moveIndex / currentSequence.length) * 100;
            document.getElementById('t-progress').style.width = pct + '%';
        }

        function nextMove() {
            if (moveIndex < currentSequence.length) {
                const move = currentSequence[moveIndex];
                chess.move(move);
                document.getElementById('bg-text').textContent = move;
                moveIndex++;
                updateBoard();
                updateTimeline();
                analyzePosition();
            } else {
                pausePlay();
            }
        }

        function prevMove() {
            if (moveIndex > 0) {
                chess.undo();
                moveIndex--;
                document.getElementById('bg-text').textContent = moveIndex > 0 ? currentSequence[moveIndex-1] : '...';
                updateBoard();
                updateTimeline();
                analyzePosition();
            }
        }

        function togglePlay() {
            const btn = document.getElementById('play-pause-btn');
            if (isPlaying) { pausePlay(); } 
            else {
                if (moveIndex >= currentSequence.length) {
                    // Reset if at end
                    chess.reset(); moveIndex = 0; updateBoard(); updateTimeline();
                }
                isPlaying = true;
                btn.textContent = '⏸';
                btn.style.color = 'var(--neon-pink)';
                btn.style.borderColor = 'var(--neon-pink)';
                
                nextMove(); // do first move immediately
                playInterval = setInterval(nextMove, 1500);
            }
        }

        function pausePlay() {
            isPlaying = false;
            clearInterval(playInterval);
            const btn = document.getElementById('play-pause-btn');
            btn.textContent = '▶';
            btn.style.color = 'var(--neon-blue)';
            btn.style.borderColor = 'var(--neon-blue)';
        }

        // ─── TAKA AUTO PLAY & FULLSCREEN ───
        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => console.log(err));
            } else {
                if (document.exitFullscreen) { document.exitFullscreen(); }
            }
        }

        let isTakaPlaying = false;
        let takaInterval = null;

        function toggleTakaAutoplay() {
            isTakaPlaying = !isTakaPlaying;
            const btn = document.getElementById('btn-taka-auto');
            if (isTakaPlaying) {
                btn.classList.add('active');
                btn.textContent = 'TAKA AI: SIMULATING MATCH...';
                if (!chess.game_over()) analyzePosition(); // trigger analysis to kick off the loop
            } else {
                btn.classList.remove('active');
                btn.textContent = 'TAKA AI AUTO-PLAY';
                clearTimeout(takaInterval);
            }
        }

        // ─── TAKA AI (ENGINE) ───
        let stockfish = null;
        let analyzeTimer = null;

        function logEngine(msg) {
            const el = document.getElementById('engine-logs');
            const div = document.createElement('div');
            div.innerHTML = msg;
            el.appendChild(div);
            el.scrollTop = el.scrollHeight;
        }

        function initStockfish() {
            try {
                const sfBlob = new Blob([`importScripts("https://cdnjs.cloudflare.com/ajax/libs/stockfish.js/10.0.0/stockfish.js");`], { type: 'application/javascript' });
                stockfish = new Worker(URL.createObjectURL(sfBlob));
                
                stockfish.onmessage = function(e) {
                    const line = e.data;
                    
                    if (line.includes('info depth') && line.includes('score cp')) {
                        const cpMatch = line.match(/score cp (-?\d+)/);
                        const depthMatch = line.match(/depth (\d+)/);
                        if (cpMatch) {
                            let cp = parseInt(cpMatch[1]);
                            if (chess.turn() === 'b') cp = -cp;
                            updateTelemetry(cp, depthMatch ? depthMatch[1] : null);
                        }
                    }
                    if (line.includes('bestmove')) {
                        const move = line.split(' ')[1];
                        document.getElementById('best-move-text').textContent = move || 'N/A';
                        logEngine(`> Found <span class="highlight">${move}</span>`);
                        
                        // Autoplay Loop
                        if (isTakaPlaying && move && move !== '(none)') {
                            takaInterval = setTimeout(() => {
                                if (chess.game_over()) { toggleTakaAutoplay(); return; }
                                
                                // Safely format the move for chess.js to accept it universally
                                const moveObj = {
                                    from: move.substring(0, 2),
                                    to: move.substring(2, 4),
                                    promotion: move.length > 4 ? move[4] : 'q'
                                };
                                const result = chess.move(moveObj);
                                
                                if (!result) {
                                    // Fallback to sloppy string parsing
                                    chess.move(move, {sloppy: true});
                                }

                                document.getElementById('bg-text').textContent = move;
                                currentSequence.push(move);
                                moveIndex++;
                                updateBoard();
                                updateTimeline();
                                analyzePosition(); // Trigger next move evaluation
                            }, 500); // Small visual delay between simulated moves
                        }
                    }
                };
                stockfish.postMessage('uci');
                logEngine('Engine <span class="highlight">ONLINE</span>');
            } catch (e) {
                logEngine('Engine initialization failed.');
            }
        }

        function analyzePosition() {
            if (!stockfish) return;
            clearTimeout(analyzeTimer);
            
            document.getElementById('best-move-text').textContent = 'CALCULATING...';
            
            analyzeTimer = setTimeout(() => {
                stockfish.postMessage('stop');
                stockfish.postMessage('position fen ' + chess.fen());
                stockfish.postMessage('go movetime 1000');
                logEngine(`> Analyzing FEN...`);
            }, 100);
        }

        function updateTelemetry(cp, depth) {
            // Eval number
            const el = document.getElementById('eval-num');
            const val = (cp / 100).toFixed(2);
            el.textContent = (cp > 0 ? '+' : '') + val;
            el.className = 'stat-val ' + (cp > 0 ? 'positive' : (cp < 0 ? 'negative' : ''));
            
            // Depth
            if (depth) document.getElementById('eval-depth').textContent = depth;
            
            // Gauge bar logic
            const fill = document.getElementById('eval-fill');
            // Logistic curve to convert centipawns to win probability percentage
            let pct = 100 / (1 + Math.exp(-0.0035 * cp));
            if (pct < 5) pct = 5; if (pct > 95) pct = 95;
            fill.style.height = pct + '%';
        }

        window.onload = init;
    </script>
</body>
</html>
