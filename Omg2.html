<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Subway Station - Multiplayer Lobby & Chat</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #000; 
            font-family: sans-serif; 
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }
        #info {
            position: absolute; top: 10px; width: 100%; text-align: center;
            color: #fff; text-shadow: 0px 2px 5px rgba(0,0,0,1); font-size: 14px; pointer-events: none; z-index: 10;
        }
        #crosshair {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: rgba(255,255,255,0.3); font-size: 20px; pointer-events: none;
        }

        /* --- PRE-GAME LOBBY --- */
        #login-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); z-index: 200;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        }
        #login-screen h1 { color: #fff; text-shadow: 0 0 10px #0088ff; margin-bottom: 20px; }
        #username-input {
            padding: 15px; font-size: 18px; border-radius: 8px; border: 2px solid #555;
            background: #111; color: white; outline: none; text-align: center; width: 250px;
            margin-bottom: 20px;
        }
        #username-input:focus { border-color: #0088ff; }
        #join-btn {
            padding: 15px 40px; font-size: 18px; border-radius: 8px; border: none;
            background: #0088ff; color: white; cursor: pointer; font-weight: bold;
            box-shadow: 0 4px 15px rgba(0, 136, 255, 0.4); transition: transform 0.1s;
        }
        #join-btn:active { transform: scale(0.95); }

        /* --- IN-GAME CHAT --- */
        #chat-ui {
            position: absolute; top: 40px; left: 20px; width: 300px;
            display: none; flex-direction: column; z-index: 100; pointer-events: none;
        }
        #chat-messages {
            max-height: 150px; overflow-y: auto; color: white; font-size: 14px;
            text-shadow: 1px 1px 2px black; margin-bottom: 10px; display: flex; flex-direction: column; gap: 5px;
        }
        .chat-msg { background: rgba(0,0,0,0.4); padding: 5px 8px; border-radius: 4px; display: inline-block; word-wrap: break-word;}
        .chat-author { font-weight: bold; color: #ffaa00; }
        #chat-input-container { pointer-events: auto; display: flex; }
        #chat-input {
            flex-grow: 1; padding: 10px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.3);
            background: rgba(0,0,0,0.6); color: white; outline: none;
        }
        #chat-input:focus { background: rgba(0,0,0,0.8); border-color: #ffaa00; }

        /* --- FLOATING NAME TAGS --- */
        .name-tag {
            position: absolute; color: white; font-weight: bold; font-size: 14px;
            text-shadow: 1px 1px 3px black, -1px -1px 3px black;
            transform: translate(-50%, -50%); pointer-events: none; z-index: 50;
            display: none; /* Hidden by default until projected */
        }

        /* --- Mobile UI Styles --- */
        #mobile-ui {
            position: absolute; bottom: 30px; width: 100%; display: none; /* Hidden until joined */
            justify-content: space-between; padding: 0 30px; box-sizing: border-box; pointer-events: none; z-index: 100;
        }
        .ui-group { pointer-events: auto; display: flex; flex-direction: column; align-items: center; }
        .dpad-row { display: flex; justify-content: center; }
        .ctrl-btn {
            width: 60px; height: 60px; margin: 5px; background: rgba(255, 255, 255, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.4); border-radius: 50%; color: white; font-size: 24px;
            font-weight: bold; display: flex; justify-content: center; align-items: center;
            backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .ctrl-btn:active, .ctrl-btn.active { background: rgba(255, 255, 255, 0.5); transform: scale(0.95); }
        .action-btn { width: 80px; height: 80px; font-size: 16px; margin-top: 65px; }
        
        @media (min-width: 1024px) { #mobile-ui { opacity: 0.5; } }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="login-screen">
        <h1>Night Subway</h1>
        <input type="text" id="username-input" placeholder="Enter your name" maxlength="16" autocomplete="off" />
        <button id="join-btn">Enter Station</button>
    </div>

    <div id="info">Walk to the ends to see the sky!</div>
    <div id="crosshair">+</div>

    <div id="chat-ui">
        <div id="chat-messages"></div>
        <div id="chat-input-container">
            <input type="text" id="chat-input" placeholder="Press Enter to chat..." autocomplete="off" />
        </div>
    </div>

    <div id="mobile-ui">
        <div class="ui-group" id="dpad">
            <div class="ctrl-btn" id="btn-w">▲</div>
            <div class="dpad-row">
                <div class="ctrl-btn" id="btn-a">◀</div>
                <div class="ctrl-btn" id="btn-s">▼</div>
                <div class="ctrl-btn" id="btn-d">▶</div>
            </div>
        </div>
        <div class="ui-group" id="action-pad">
            <div class="ctrl-btn action-btn" id="btn-shift">SPRINT</div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        
        // Supabase Import
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/+esm';

        // --- SUPABASE SETUP ---
        const SUPABASE_URL = 'https://jtvzlockqehfdopgargp.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp0dnpsb2NrcWVoZmRvcGdhcmdwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3Mzg4NDEsImV4cCI6MjA4NzMxNDg0MX0.IzpZrP7o45VmRuCr90UpwZ-T6xE4cBVsk1KUtUBTflc';
        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);
        
        const myPlayerId = crypto.randomUUID();
        let myUsername = "Anonymous";
        const networkPlayers = {}; 
        let channel;
        let gameActive = false; // Prevents movement until joined

        // 1. Scene & Camera Setup
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x0a1018, 0.008); 
        
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);

        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.0;
        document.body.appendChild(renderer.domElement);

        // 2. Post-Processing (Bloom)
        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
        bloomPass.threshold = 1.2; bloomPass.strength = 1.2; bloomPass.radius = 0.5;
        const composer = new EffectComposer(renderer);
        composer.addPass(renderScene); composer.addPass(bloomPass);

        // 3. PROCEDURAL SKYBOX
        function createSkyboxTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 2048; canvas.height = 1024;
            const ctx = canvas.getContext('2d');
            const gradient = ctx.createLinearGradient(0, 0, 0, 1024);
            gradient.addColorStop(0, '#010308'); gradient.addColorStop(0.4, '#0a1a3a'); 
            gradient.addColorStop(0.6, '#3a2030'); gradient.addColorStop(1, '#000000');
            ctx.fillStyle = gradient; ctx.fillRect(0, 0, 2048, 1024);

            for(let i = 0; i < 3000; i++) {
                ctx.fillStyle = Math.random() > 0.8 ? '#ffffff' : '#88aaff';
                const x = Math.random() * 2048; const y = Math.random() * 600; 
                ctx.beginPath(); ctx.arc(x, y, Math.random() * 1.2, 0, Math.PI * 2); ctx.fill();
            }
            const texture = new THREE.CanvasTexture(canvas);
            texture.colorSpace = THREE.SRGBColorSpace; return texture;
        }
        const skybox = new THREE.Mesh(new THREE.SphereGeometry(500, 32, 32), new THREE.MeshBasicMaterial({ map: createSkyboxTexture(), side: THREE.BackSide, fog: false }));
        scene.add(skybox);

        // 4. Procedural Floor
        function createTileTexture() {
            const canvas = document.createElement('canvas'); canvas.width = 1024; canvas.height = 1024;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#1e1e1e'; ctx.fillRect(0, 0, 1024, 1024);
            ctx.strokeStyle = '#0a0a0a'; ctx.lineWidth = 4;
            for(let i = 0; i <= 1024; i += 128) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, 1024); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(1024, i); ctx.stroke();
            }
            for(let i=0; i<30000; i++) {
                ctx.fillStyle = Math.random() > 0.5 ? 'rgba(0,0,0,0.1)' : 'rgba(255,255,255,0.03)';
                ctx.fillRect(Math.random()*1024, Math.random()*1024, 3, 3);
            }
            const texture = new THREE.CanvasTexture(canvas);
            texture.wrapS = THREE.RepeatWrapping; texture.wrapT = THREE.RepeatWrapping;
            texture.repeat.set(2, 20); 
            return { map: texture, bumpMap: texture };
        }
        const tiles = createTileTexture();

        // 5. Materials & Environment
        const platformMat = new THREE.MeshStandardMaterial({ map: tiles.map, bumpMap: tiles.bumpMap, bumpScale: 0.02, roughness: 0.3, metalness: 0.2 });
        const wallMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.9 });
        const metalMat = new THREE.MeshStandardMaterial({ color: 0x444444, metalness: 0.9, roughness: 0.4 });
        const neonBlueMat = new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0x0088ff, emissiveIntensity: 2.5 });
        const neonOrangeMat = new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0xff4400, emissiveIntensity: 3.0 });
        const windowGlowMat = new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0xffeedd, emissiveIntensity: 2.0 });

        const tunnel = new THREE.Mesh(new THREE.CylinderGeometry(16, 16, 80, 32, 1, true, 0, Math.PI), wallMat);
        tunnel.rotation.x = Math.PI / 2; tunnel.material.side = THREE.BackSide; scene.add(tunnel);

        const platform = new THREE.Mesh(new THREE.BoxGeometry(12, 2, 150), platformMat);
        platform.position.set(7, 1, 0); scene.add(platform);

        const safetyLine = new THREE.Mesh(new THREE.BoxGeometry(0.6, 2.02, 150), new THREE.MeshStandardMaterial({ color: 0xffaa00, roughness: 0.9 }));
        safetyLine.position.set(1.5, 1, 0); scene.add(safetyLine);

        // Train
        const trainGroup = new THREE.Group();
        const trainBody = new THREE.Mesh(new THREE.BoxGeometry(5.5, 4.5, 120), metalMat);
        trainBody.position.set(-7, 3.25, 10); trainGroup.add(trainBody);
        const windowGeo = new THREE.BoxGeometry(0.1, 1.5, 3);
        for(let i = -45; i <= 65; i += 5) {
            if(i % 15 === 0) continue; 
            const win = new THREE.Mesh(windowGeo, windowGlowMat); win.position.set(-4.2, 3.5, i); trainGroup.add(win);
            const winLight = new THREE.PointLight(0xffeedd, 5, 8); winLight.position.set(-3.5, 3.5, i); trainGroup.add(winLight);
        }
        scene.add(trainGroup);

        // Tracks & Sleepers
        const railGeo = new THREE.BoxGeometry(0.2, 0.4, 150);
        const rail1 = new THREE.Mesh(railGeo, metalMat); rail1.position.set(-5, 0.7, 0); scene.add(rail1);
        const rail2 = new THREE.Mesh(railGeo, metalMat); rail2.position.set(-9, 0.7, 0); scene.add(rail2);
        const tieGeo = new THREE.BoxGeometry(5, 0.2, 0.6);
        for(let i = -75; i < 75; i += 1.5) {
            const tie = new THREE.Mesh(tieGeo, wallMat); tie.position.set(-7, 0.5, i); scene.add(tie);
        }

        // Pillars & Lighting
        scene.add(new THREE.AmbientLight(0x1a2b4c, 0.6));
        for(let i = -60; i <= 60; i += 25) {
            const pillar = new THREE.Mesh(new THREE.BoxGeometry(1.2, 12, 1.2), new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.7 }));
            pillar.position.set(10, 8, i); scene.add(pillar);
            const ad = new THREE.Mesh(new THREE.BoxGeometry(1.3, 3.5, 2.5), i % 50 === 0 ? neonOrangeMat : neonBlueMat);
            ad.position.set(10, 5, i); scene.add(ad);
            const bench = new THREE.Mesh(new THREE.BoxGeometry(3, 0.5, 1), metalMat);
            bench.position.set(8, 2.25, i); scene.add(bench);
        }
        for(let i = -30; i <= 30; i += 15) {
            const fixture = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.4, 2, 8), neonBlueMat);
            fixture.rotation.x = Math.PI / 2; fixture.position.set(6, 12, i); scene.add(fixture);
            const pointLight = new THREE.PointLight(0xddeeff, 60, 25);
            pointLight.position.set(6, 11.5, i); pointLight.shadow.bias = -0.002; scene.add(pointLight);
        }

        // --- PLAYER MODEL ---
        function createPlayerModel(bodyColor, headColor) {
            const p = new THREE.Group();
            const pBody = new THREE.Mesh(new THREE.BoxGeometry(0.7, 1.4, 0.4), new THREE.MeshStandardMaterial({ color: bodyColor }));
            pBody.position.y = 2.7; p.add(pBody);
            const pHead = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.4, 0.4), new THREE.MeshStandardMaterial({ color: headColor }));
            pHead.position.y = 3.7; p.add(pHead);
            return p;
        }

        const player = createPlayerModel(0x111111, 0xffddcc);
        player.position.set(6, 0, 0); player.rotation.y = Math.PI;
        scene.add(player);

        // --- LOBBY, CHAT & MULTIPLAYER LOGIC ---
        
        function addChatMessage(sender, text) {
            const chatBox = document.getElementById('chat-messages');
            const msgDiv = document.createElement('div');
            msgDiv.className = 'chat-msg';
            msgDiv.innerHTML = `<span class="chat-author">${sender}:</span> ${text}`;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight; // Auto-scroll to bottom
        }

        const chatInput = document.getElementById('chat-input');
        chatInput.addEventListener('keydown', (e) => {
            if(e.key === 'Enter' && chatInput.value.trim() !== '') {
                const text = chatInput.value.trim();
                // Show locally immediately
                addChatMessage(myUsername, text);
                // Broadcast to others
                if(channel) {
                    channel.send({ type: 'broadcast', event: 'chat', payload: { name: myUsername, text: text } });
                }
                chatInput.value = '';
                chatInput.blur(); // Return focus to game
            }
        });

        document.getElementById('join-btn').addEventListener('click', () => {
            const nameInput = document.getElementById('username-input').value.trim();
            if(nameInput) myUsername = nameInput;
            
            // Hide Lobby, Show UI
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('mobile-ui').style.display = 'flex';
            document.getElementById('chat-ui').style.display = 'flex';
            
            gameActive = true;
            connectToSupabase();
        });

        function connectToSupabase() {
            channel = supabase.channel('subway-room', {
                config: { broadcast: { self: false }, presence: { key: myPlayerId } },
            });

            // Handle Players joining and leaving
            channel.on('presence', { event: 'sync' }, () => {
                const state = channel.presenceState();
                const activeIds = Object.keys(state);

                // Remove disconnected players and their name tags
                for (let id in networkPlayers) {
                    if (!activeIds.includes(id)) {
                        scene.remove(networkPlayers[id]);
                        delete networkPlayers[id];
                        const oldTag = document.getElementById('tag-' + id);
                        if(oldTag) oldTag.remove();
                    }
                }

                // Add new players
                for (let id of activeIds) {
                    if (id !== myPlayerId && !networkPlayers[id]) {
                        // Extract username from presence data
                        const pData = state[id][0];
                        const pName = pData.username || "Anonymous";

                        // Create 3D Model
                        const netPlayer = createPlayerModel(0x0055aa, 0xffccaa);
                        scene.add(netPlayer);
                        networkPlayers[id] = netPlayer;

                        // Create HTML Name Tag
                        const tag = document.createElement('div');
                        tag.id = 'tag-' + id;
                        tag.className = 'name-tag';
                        tag.innerText = pName;
                        document.body.appendChild(tag);
                        
                        addChatMessage("System", `${pName} entered the station.`);
                    }
                }
            });

            // Sync Movement & Chat
            channel.on('broadcast', { event: 'move' }, (payload) => {
                const data = payload.payload;
                const netPlayer = networkPlayers[data.id];
                if (netPlayer) {
                    netPlayer.position.set(data.x, data.y, data.z);
                    netPlayer.rotation.y = data.ry;
                }
            });

            channel.on('broadcast', { event: 'chat' }, (payload) => {
                const data = payload.payload;
                addChatMessage(data.name, data.text);
            });

            channel.subscribe(async (status) => {
                if (status === 'SUBSCRIBED') {
                    // Send our name so others can see it
                    await channel.track({ online_at: new Date().toISOString(), username: myUsername });
                }
            });
        }

        // --- CONTROLS ---
        const keys = { w: false, a: false, s: false, d: false, shift: false };
        
        document.addEventListener('keydown', (e) => {
            if(!gameActive) return;
            // Prevent WASD movement when typing in chat
            if (document.activeElement === chatInput) return;

            const key = e.key.toLowerCase();
            if (key === 'w' || key === 'arrowup') keys.w = true;
            if (key === 'a' || key === 'arrowleft') keys.a = true;
            if (key === 's' || key === 'arrowdown') keys.s = true;
            if (key === 'd' || key === 'arrowright') keys.d = true;
            if (key === 'shift') keys.shift = true;
        });

        document.addEventListener('keyup', (e) => {
            if(!gameActive) return;
            const key = e.key.toLowerCase();
            if (key === 'w' || key === 'arrowup') keys.w = false;
            if (key === 'a' || key === 'arrowleft') keys.a = false;
            if (key === 's' || key === 'arrowdown') keys.s = false;
            if (key === 'd' || key === 'arrowright') keys.d = false;
            if (key === 'shift') keys.shift = false;
        });

        function setupTouchButton(buttonId, keyName) {
            const btn = document.getElementById(buttonId);
            const press = (e) => { e.preventDefault(); if(gameActive) { keys[keyName] = true; btn.classList.add('active'); } };
            const release = (e) => { e.preventDefault(); keys[keyName] = false; btn.classList.remove('active'); };
            btn.addEventListener('touchstart', press, { passive: false });
            btn.addEventListener('touchend', release, { passive: false });
            btn.addEventListener('touchcancel', release, { passive: false });
            btn.addEventListener('mousedown', press);
            btn.addEventListener('mouseup', release);
            btn.addEventListener('mouseleave', release);
        }
        setupTouchButton('btn-w', 'w'); setupTouchButton('btn-a', 'a');
        setupTouchButton('btn-s', 's'); setupTouchButton('btn-d', 'd'); setupTouchButton('btn-shift', 'shift');

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });

        const currentCamPos = new THREE.Vector3();
        const currentLookAt = new THREE.Vector3();
        const lastSentPos = new THREE.Vector3();
        let lastSentRot = 0;

        // 13. Animation Loop
        function animate() {
            requestAnimationFrame(animate);

            if (gameActive) {
                const moveSpeed = keys.shift ? 0.2 : 0.08;
                const turnSpeed = 0.04;

                if (keys.w) player.translateZ(moveSpeed);
                if (keys.s) player.translateZ(-moveSpeed);
                if (keys.a) player.rotation.y += turnSpeed;
                if (keys.d) player.rotation.y -= turnSpeed;

                if (player.position.x > 12) player.position.x = 12;
                if (player.position.x < 2.5) player.position.x = 2.5; 
                if (player.position.z > 70) player.position.z = 70;
                if (player.position.z < -70) player.position.z = -70;

                // Send network updates
                if (channel && (lastSentPos.distanceTo(player.position) > 0.05 || Math.abs(lastSentRot - player.rotation.y) > 0.05)) {
                    channel.send({ type: 'broadcast', event: 'move', payload: { id: myPlayerId, x: player.position.x, y: player.position.y, z: player.position.z, ry: player.rotation.y } });
                    lastSentPos.copy(player.position); lastSentRot = player.rotation.y;
                }
            } else {
                // If not joined, slowly rotate camera for a nice background effect
                player.rotation.y += 0.002;
            }

            // Camera follow
            const idealOffset = new THREE.Vector3(1.5, 4.5, -5); 
            idealOffset.applyQuaternion(player.quaternion);
            idealOffset.add(player.position);

            const idealLookAt = new THREE.Vector3(0, 3, 10); 
            idealLookAt.applyQuaternion(player.quaternion);
            idealLookAt.add(player.position);

            currentCamPos.lerp(idealOffset, 0.1);
            currentLookAt.lerp(idealLookAt, 0.1);

            camera.position.copy(currentCamPos);
            camera.lookAt(currentLookAt);

            // Update Name Tag Positions on Screen
            for(let id in networkPlayers) {
                const netPlayer = networkPlayers[id];
                const tag = document.getElementById('tag-' + id);
                if(tag) {
                    const vector = new THREE.Vector3();
                    // Get position slightly above the head
                    vector.setFromMatrixPosition(netPlayer.children[1].matrixWorld); 
                    vector.y += 0.8; 
                    
                    // Project 3D vector to 2D screen space
                    vector.project(camera);

                    // If the vector.z is < 1, the player is in front of the camera
                    if (vector.z < 1) {
                        const x = (vector.x * 0.5 + 0.5) * window.innerWidth;
                        const y = (vector.y * -0.5 + 0.5) * window.innerHeight;
                        tag.style.left = `${x}px`;
                        tag.style.top = `${y}px`;
                        tag.style.display = 'block';
                    } else {
                        tag.style.display = 'none'; // Hide if behind camera
                    }
                }
            }

            skybox.rotation.y += 0.0002;
            composer.render();
        }

        animate();
    </script>
</body>
</html>
