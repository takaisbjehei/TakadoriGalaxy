<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chess Arena - Live Match</title>
    <meta name="description"
        content="Premium multiplayer chess — 1v1 and 4-player modes with live chat and full rule enforcement.">
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #0d0d0d;
            --bg2: #141414;
            --bg3: #1c1c1c;
            --bg4: #242424;
            --border: #2e2e2e;
            --border2: #3a3a3a;
            --text: #f0f0f0;
            --text2: #999;
            --text3: #555;
            --white: #ffffff;
            --accent: #e0e0e0;

            --p0: #e8e8e8;
            /* Red → White */
            --p1: #a0a0a0;
            /* Blue → Light Gray */
            --p2: #686868;
            /* Green → Mid Gray */
            --p3: #404040;
            /* Yellow → Dark Gray */

            --p0-glow: rgba(232, 232, 232, 0.35);
            --p1-glow: rgba(160, 160, 160, 0.35);
            --p2-glow: rgba(104, 104, 104, 0.35);
            --p3-glow: rgba(64, 64, 64, 0.35);

            --sq-light: #dfb987;
            --sq-dark: #2d2d2d;
            --sq-selected: rgba(255, 255, 255, 0.18);
            --sq-valid: rgba(255, 255, 255, 0.10);
            --sq-capture: rgba(255, 255, 255, 0.15);
            /* Trail highlight for moving pieces */
            --sq-last: rgba(255, 230, 80, 0.35);
            --sq-check: rgba(255, 80, 80, 0.30);

            --cell-4p: 46px;
            --cell-1v1: 68px;
            --cell: var(--cell-4p);

            --chat-w: 280px;
            --panel-w: 170px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* ─── TOP NAV ─── */
        #topnav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 16px;
            background: var(--bg2);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            z-index: 50;
        }

        #topnav h1 {
            font-family: 'Orbitron';
            font-size: 1rem;
            letter-spacing: 4px;
            color: var(--text);
            text-transform: uppercase;
        }

        #game-subtitle {
            font-size: 0.65rem;
            color: var(--text3);
            letter-spacing: 2px;
            margin-top: 2px;
        }

        .nav-btn {
            font-family: 'Orbitron';
            font-size: 0.6rem;
            letter-spacing: 1px;
            padding: 7px 14px;
            border: 1px solid var(--border2);
            border-radius: 8px;
            background: var(--bg3);
            color: var(--text2);
            cursor: pointer;
            transition: all 0.2s;
        }

        .nav-btn:hover {
            background: var(--bg4);
            color: var(--text);
        }

        .nav-btn.danger {
            border-color: #555;
        }

        .nav-btn.danger:hover {
            border-color: #888;
            color: #ccc;
        }

        /* ─── MAIN LAYOUT ─── */
        #main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* ─── SIDE PANELS (desktop) ─── */
        .side-panel {
            width: var(--panel-w);
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 12px 8px;
            background: var(--bg2);
            border-right: 1px solid var(--border);
            overflow-y: auto;
        }

        .side-panel.right-panel {
            border-right: none;
            border-left: 1px solid var(--border);
        }

        /* ─── BOARD AREA ─── */
        #board-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 12px;
            overflow: auto;
        }

        /* ─── PLAYER CARDS ─── */
        .player-card {
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px 14px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .player-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            opacity: 0.5;
            transition: opacity 0.3s;
        }

        .player-card[data-player="0"]::before {
            background: var(--p0);
        }

        .player-card[data-player="1"]::before {
            background: var(--p1);
        }

        .player-card[data-player="2"]::before {
            background: var(--p2);
        }

        .player-card[data-player="3"]::before {
            background: var(--p3);
        }

        .player-card.active {
            border-color: var(--border2);
            box-shadow: 0 0 18px rgba(255, 255, 255, 0.06);
        }

        .player-card.active::before {
            opacity: 1;
        }

        .player-card.eliminated {
            opacity: 0.3;
            filter: grayscale(0.8);
        }

        .pcard-name {
            font-family: 'Orbitron';
            font-weight: 700;
            font-size: 0.7rem;
            letter-spacing: 2px;
            margin-bottom: 4px;
            color: var(--text);
        }

        .player-card[data-player="0"] .pcard-name {
            color: var(--p0);
        }

        .player-card[data-player="1"] .pcard-name {
            color: var(--p1);
        }

        .player-card[data-player="2"] .pcard-name {
            color: var(--p2);
        }

        .player-card[data-player="3"] .pcard-name {
            color: var(--p3);
        }

        .pcard-status {
            font-size: 0.6rem;
            color: var(--text3);
            min-height: 14px;
            margin-bottom: 6px;
        }

        .pcard-captured {
            display: flex;
            flex-wrap: wrap;
            gap: 1px;
            font-size: 0.85rem;
            min-height: 18px;
        }

        /* ─── HORIZ PLAYER STRIP (mobile + 1v1) ─── */
        .player-strip {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--bg2);
            border-bottom: 1px solid var(--border);
            padding: 8px 12px;
            width: 100%;
            justify-content: center;
        }

        .player-strip.bottom-strip {
            border-bottom: none;
            border-top: 1px solid var(--border);
        }

        .strip-name {
            font-family: 'Orbitron';
            font-size: 0.65rem;
            letter-spacing: 2px;
        }

        .strip-status {
            font-size: 0.55rem;
            color: var(--text3);
        }

        .strip-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        /* ─── BOARD ─── */
        #board-wrapper {
            position: relative;
            padding: 4px;
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 8px;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.6);
        }

        /* ─── TIMER BAR ─── */
        #timer-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            padding: 6px 2px;
            gap: 12px;
        }

        #game-clock {
            font-family: 'Orbitron';
            font-size: 0.7rem;
            letter-spacing: 2px;
            color: var(--text3);
            white-space: nowrap;
        }

        #game-clock span { color: var(--text2); }

        #turn-timer-wrap {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #turn-timer-label {
            font-family: 'Orbitron';
            font-size: 0.6rem;
            letter-spacing: 1px;
            color: var(--text3);
            white-space: nowrap;
        }

        #turn-timer-bar-bg {
            flex: 1;
            height: 5px;
            background: var(--bg4);
            border-radius: 3px;
            overflow: hidden;
        }

        #turn-timer-bar-fill {
            height: 100%;
            border-radius: 3px;
            width: 100%;
            background: var(--p0);
            transition: width 1s linear, background 0.5s;
        }

        #turn-timer-count {
            font-family: 'Orbitron';
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text);
            min-width: 32px;
            text-align: right;
        }

        #turn-timer-count.warning { color: #f97316; }
        #turn-timer-count.danger  { color: #ef4444; animation: flash-red 0.5s ease-in-out infinite; }

        @keyframes flash-red {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.4; }
        }


        #board {
            display: grid;
            border-radius: 4px;
            overflow: hidden;
            transform: rotate(var(--board-rot, 0deg));
        }

        .cell {
            width: var(--cell);
            height: var(--cell);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: calc(var(--cell) * 0.58);
            cursor: pointer;
            position: relative;
            transition: background 0.1s ease;
            user-select: none;
            -webkit-user-select: none;
        }

        .cell.light {
            background: var(--sq-light);
        }

        .cell.dark {
            background: var(--sq-dark);
        }

        .cell.invalid {
            background: transparent;
            cursor: default;
            pointer-events: none;
        }

        .cell.selected {
            background: var(--sq-selected) !important;
        }

        .cell.last-move {
            background-color: var(--sq-last) !important;
        }

        .cell.in-check {
            background-color: var(--sq-check) !important;
        }

        .cell:hover:not(.invalid):not(.selected) {
            filter: brightness(1.2);
        }

        .cell.valid-move::after {
            content: '';
            position: absolute;
            width: 28%;
            height: 28%;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.22);
            pointer-events: none;
        }

        .cell.valid-capture {
            background: var(--sq-capture) !important;
        }

        .cell.valid-capture::after {
            content: '';
            position: absolute;
            inset: 3px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.3);
            pointer-events: none;
        }

        .piece {
            position: relative;
            z-index: 2;
            line-height: 1;
            pointer-events: none;
            transition: transform 0.1s ease;
            transform: rotate(var(--piece-rot, 0deg));
            display: inline-block;
        }

        /* Board coordinate labels */
        .cell-coord {
            position: absolute;
            font-family: 'Inter';
            font-size: calc(var(--cell) * 0.18);
            font-weight: 700;
            pointer-events: none;
            user-select: none;
            line-height: 1;
            opacity: 0.45;
            z-index: 3;
            transform: rotate(var(--piece-rot, 0deg));
        }

        .cell-coord.bl { bottom: 2px; left: 3px; }
        .cell-coord.tr { top: 2px; right: 3px; }
        .cell-coord.br { bottom: 2px; right: 3px; }

        .cell:hover .piece {
            transform: rotate(var(--piece-rot, 0deg)) scale(1.08) !important;
        }

        .pcard-captured .piece,
        .promo-btn .piece {
            transform: none !important;
        }

        .piece.p0 {
            color: var(--p0);
            text-shadow: 0 0 10px var(--p0-glow), 0 2px 4px rgba(0, 0, 0, 0.6);
        }

        .piece.p1 {
            color: var(--p1);
            text-shadow: 0 0 10px var(--p1-glow), 0 2px 4px rgba(0, 0, 0, 0.6);
        }

        .piece.p2 {
            color: var(--p2);
            text-shadow: 0 0 10px var(--p2-glow), 0 2px 4px rgba(0, 0, 0, 0.6);
        }

        .piece.p3 {
            color: var(--p3);
            text-shadow: 0 0 10px var(--p3-glow), 0 2px 4px rgba(0, 0, 0, 0.6);
        }

        .piece.elim {
            opacity: 0.25;
            filter: grayscale(1);
        }

        /* ─── CHAT PANEL ─── */
        #chat-panel {
            width: var(--chat-w);
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            background: var(--bg2);
            border-left: 1px solid var(--border);
        }

        .chat-header {
            padding: 12px 14px;
            border-bottom: 1px solid var(--border);
            font-family: 'Orbitron';
            font-size: 0.65rem;
            letter-spacing: 3px;
            color: var(--text2);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        #chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        #chat-messages::-webkit-scrollbar {
            width: 4px;
        }

        #chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }

        #chat-messages::-webkit-scrollbar-thumb {
            background: var(--border2);
            border-radius: 4px;
        }

        .chat-msg {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .chat-msg .msg-author {
            font-size: 0.58rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .chat-msg .msg-text {
            font-size: 0.75rem;
            color: var(--text);
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 0 8px 8px 8px;
            padding: 5px 9px;
            width: fit-content;
            max-width: 100%;
            word-wrap: break-word;
            line-height: 1.4;
        }

        .chat-msg.mine {
            align-items: flex-end;
        }

        .chat-msg.mine .msg-text {
            border-radius: 8px 0 8px 8px;
            background: var(--bg4);
        }

        .chat-msg .msg-author.cp0 {
            color: var(--p0);
        }

        .chat-msg .msg-author.cp1 {
            color: var(--p1);
        }

        .chat-msg .msg-author.cp2 {
            color: var(--p2);
        }

        .chat-msg .msg-author.cp3 {
            color: var(--p3);
        }

        .chat-system-msg {
            font-size: 0.65rem;
            color: var(--text3);
            text-align: center;
            padding: 3px 0;
            font-style: italic;
        }

        .emoji-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            padding: 6px 10px;
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
        }

        .emo-btn {
            font-size: 1.2rem;
            background: none;
            border: 1px solid transparent;
            border-radius: 6px;
            padding: 2px 5px;
            cursor: pointer;
            transition: all 0.15s;
            line-height: 1;
        }

        .emo-btn:hover {
            background: var(--bg4);
            border-color: var(--border2);
            transform: scale(1.2);
        }

        .chat-input-wrap {
            display: flex;
            gap: 6px;
            padding: 8px 10px;
            border-top: 1px solid var(--border);
        }

        #chat-input {
            flex: 1;
            background: var(--bg3);
            border: 1px solid var(--border2);
            color: var(--text);
            font-family: 'Inter';
            font-size: 0.8rem;
            border-radius: 8px;
            padding: 7px 10px;
            outline: none;
            resize: none;
            height: 36px;
            line-height: 1.4;
            transition: border 0.2s;
        }

        #chat-input:focus {
            border-color: var(--border2);
        }

        #chat-send {
            background: var(--bg4);
            border: 1px solid var(--border2);
            color: var(--text2);
            border-radius: 8px;
            padding: 7px 12px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s;
        }

        #chat-send:hover {
            background: var(--bg3);
            color: var(--text);
        }

        /* ─── MOBILE CHAT BOTTOM SHEET ─── */
        #chat-toggle {
            display: none;
        }

        /* Bottom sheet container */
        #mobile-chat-sheet {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 500;
            flex-direction: column;
            pointer-events: none;
        }

        /* Collapsed handle bar - always visible on mobile */
        #chat-sheet-handle {
            pointer-events: all;
            background: linear-gradient(135deg, var(--bg3) 0%, var(--bg4) 100%);
            border: 1px solid var(--border2);
            border-bottom: none;
            border-radius: 16px 16px 0 0;
            padding: 8px 16px 6px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.5);
            user-select: none;
            transition: background 0.2s;
        }

        #chat-sheet-handle:active { background: var(--bg4); }

        .sheet-handle-pill {
            width: 36px;
            height: 4px;
            border-radius: 2px;
            background: var(--border2);
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            top: 7px;
        }

        .sheet-handle-left {
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'Orbitron';
            font-size: 0.6rem;
            letter-spacing: 2px;
            color: var(--text2);
            margin-top: 6px;
        }

        .sheet-chat-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #4ade80;
            box-shadow: 0 0 6px #4ade80;
            animation: pulse-dot 1.5s ease-in-out infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        #chat-badge {
            background: #e0e0e0;
            color: #000;
            font-size: 0.55rem;
            border-radius: 10px;
            min-width: 18px;
            height: 18px;
            display: none;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            padding: 0 4px;
            margin-left: 4px;
        }

        .sheet-handle-right {
            font-size: 0.65rem;
            color: var(--text3);
            margin-top: 6px;
            transition: transform 0.3s;
        }

        #mobile-chat-sheet.expanded .sheet-handle-right { transform: rotate(180deg); }

        /* Expandable body */
        #chat-sheet-body {
            pointer-events: all;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.35s cubic-bezier(0.2, 0.8, 0.2, 1);
            background: var(--bg2);
            border: 1px solid var(--border2);
            border-bottom: none;
            display: flex;
            flex-direction: column;
        }

        #mobile-chat-sheet.expanded #chat-sheet-body { max-height: 55vh; }

        #chat-messages-mobile {
            flex: 1;
            overflow-y: auto;
            padding: 10px 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            min-height: 0;
        }

        .sheet-input-wrap {
            display: flex;
            gap: 6px;
            padding: 8px 10px;
            border-top: 1px solid var(--border);
            background: var(--bg2);
        }

        .sheet-input-wrap input {
            flex: 1;
            background: var(--bg3);
            border: 1px solid var(--border2);
            color: var(--text);
            font-family: 'Inter';
            font-size: 0.85rem;
            border-radius: 20px;
            padding: 8px 14px;
            outline: none;
        }

        .sheet-input-wrap button {
            background: var(--bg4);
            border: 1px solid var(--border2);
            color: var(--text);
            border-radius: 50%;
            width: 36px;
            height: 36px;
            cursor: pointer;
            font-size: 1rem;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .sheet-input-wrap button:active { background: var(--bg3); }

        .sheet-emoji-bar {
            display: flex;
            gap: 3px;
            padding: 5px 10px;
            border-top: 1px solid var(--border);
            overflow-x: auto;
            scrollbar-width: none;
        }

        .sheet-emoji-bar::-webkit-scrollbar { display: none; }

        /* hide old overlay on mobile */
        #chat-overlay { display: none !important; }

        /* ─── LOADING ─── */
        #loading-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
        }

        #loading-overlay h2 {
            font-family: 'Orbitron';
            font-size: 1.1rem;
            letter-spacing: 5px;
            color: var(--text2);
            animation: blink 1s infinite alternate;
        }

        .loading-bar {
            width: 180px;
            height: 2px;
            background: var(--border);
            border-radius: 2px;
            overflow: hidden;
        }

        .loading-fill {
            height: 100%;
            background: var(--text2);
            animation: load 1.5s ease-in-out infinite;
        }

        @keyframes load {
            0% {
                width: 0%
            }

            50% {
                width: 80%
            }

            100% {
                width: 100%
            }
        }

        @keyframes blink {
            from {
                opacity: 1
            }

            to {
                opacity: 0.4
            }
        }

        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ─── MODALS ─── */
        .modal-backdrop {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(5px);
            z-index: 500;
            align-items: center;
            justify-content: center;
        }

        .modal-backdrop.show {
            display: flex;
        }

        .modal {
            background: var(--bg2);
            border: 1px solid var(--border2);
            border-radius: 16px;
            padding: 28px 32px;
            text-align: center;
            max-width: 340px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7);
        }

        .modal h2 {
            font-family: 'Orbitron';

        const EMOJIS = ['👑', '⚔️', '🛡️', '💀', '😂', '👏', '🔥', '💯', '🤔', '😤', '🥶', '🎯', '🤯', '😎', '🤝', '🏳️'];
        let spectatorChannel = null;
        let isSpectator = false;

        async function abortMission(destination = 'chesshome.html') {
            if (window.gameStatus === 'in_progress' && engine && !engine.gameOver && myColor >= 0) {
                const isConfirmed = confirm("WARNING: Abandoning the match will result in an automatic forfeit. Leave anyway?");
                if (!isConfirmed) return;

                if (gameMode === 2) {
                    const winnerColor = 1 - myColor;
                    const winnerPlayer = window.gamePlayers && window.gamePlayers.find(p => p.color_index === winnerColor);
                    if (winnerPlayer) {
                        try {
                            const storageKey = Object.keys(localStorage).find(k => k.startsWith('sb-') && k.endsWith('-auth-token'));
                            const token = storageKey ? JSON.parse(localStorage.getItem(storageKey)).access_token : SUPABASE_KEY;
                            fetch(`${SUPABASE_URL}/rest/v1/games?id=eq.${gameId}`, {
                                method: 'PATCH',
                                headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                                body: JSON.stringify({ status: 'finished', winner_id: winnerPlayer.user_id }),
                                keepalive: true
                            }).catch(()=>{});
                        } catch(e){}
                    }
                } else {
                    const storageKey = Object.keys(localStorage).find(k => k.startsWith('sb-') && k.endsWith('-auth-token'));
                    const token = storageKey ? JSON.parse(localStorage.getItem(storageKey)).access_token : SUPABASE_KEY;
                    fetch(`${SUPABASE_URL}/rest/v1/game_players?game_id=eq.${gameId}&user_id=eq.${currentUser.id}`, {
                        method: 'PATCH',
                        headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
                        body: JSON.stringify({ is_eliminated: true }),
                        keepalive: true
                    }).catch(()=>{});
                    fetch(`${SUPABASE_URL}/rest/v1/chat_messages`, {
                        method: 'POST',
                        headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
                        body: JSON.stringify({ game_id: gameId, user_id: currentUser.id, username: "[SYSTEM]", color_index: myColor, message: `${myUsername} has abandoned the battlefield.` }),
                        keepalive: true
                    }).catch(()=>{});
                }
            }

            // Untrack spectator presence before leaving
            if (spectatorChannel) {
                try { await spectatorChannel.untrack(); } catch(e) {}
            }
            if (gameId && currentUser && myColor >= 0) {
                // Only players (not spectators) need DB cleanup
                const loader = document.getElementById('loading-overlay');
                if (loader) {
                    loader.style.display = 'flex';
                    loader.innerHTML = '<h2 style="font-family:Orbitron;color:var(--text);letter-spacing:4px">DISCONNECTING...</h2>';
                }
                try {
                    const { data: gameRow } = await sb.from('games').select('status').eq('id', gameId).single();
                    if (gameRow && gameRow.status === 'waiting') {
                        const { data: players } = await sb.from('game_players').select('*').eq('game_id', gameId);
                        if (players && players.length === 1 && players[0].user_id === currentUser.id) {
                            await sb.from('game_players').delete().eq('game_id', gameId).eq('user_id', currentUser.id);
                            await sb.from('games').delete().eq('id', gameId);
                        } else if (players && players.length > 0) {
                            await sb.from('game_players').delete().eq('game_id', gameId).eq('user_id', currentUser.id);
                        }
                    }
                } catch (e) {
                    console.error('Leave logic failed:', e);
                }
            }
            window.location.href = destination;
        }

        window.addEventListener('beforeunload', () => {
            // Mark in sessionStorage so pagehide can tell it's a same-tab reload, not a real close
            sessionStorage.setItem('_chess_reload_ts', Date.now());
        });

        window.addEventListener('pagehide', () => {
            if (spectatorChannel) {
                try { spectatorChannel.untrack(); } catch(e) {}
            }
            if (window.isReloading) return;

            // RELOAD GUARD: if beforeunload was very recent (same tab refresh/Ctrl+F5)
            // and game is in_progress, skip the forfeit — initSystem will repair is_eliminated
            const reloadTs = parseInt(sessionStorage.getItem('_chess_reload_ts') || '0');
            const isLikelyReload = (Date.now() - reloadTs) < 3000;
            if (isLikelyReload && window.gameStatus === 'in_progress') {
                sessionStorage.removeItem('_chess_reload_ts');
                return;
            }
            sessionStorage.removeItem('_chess_reload_ts');

            if (gameId && currentUser && myColor >= 0) {
                const storageKey = Object.keys(localStorage).find(k => k.startsWith('sb-') && k.endsWith('-auth-token'));

                    try { token = JSON.parse(localStorage.getItem(storageKey)).access_token; } catch(e){}

                            body: JSON.stringify({ is_eliminated: true }),
                            keepalive: true
                        }).catch(()=>{});

                } else if (window.gameStatus === 'waiting') {
                    // Erase self from waiting room so it doesn't leave a ghost
                    fetch(`${SUPABASE_URL}/rest/v1/game_players?game_id=eq.${gameId}&user_id=eq.${currentUser.id}`, {
