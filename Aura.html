<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AuraChat | Premium Intelligence</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #FF7A00;
      --primary-glow: rgba(255, 122, 0, 0.4);
      --bg-color: #0c0c0e;
      --surface: rgba(30, 30, 32, 0.4);
      --surface-border: rgba(255, 255, 255, 0.08);
      --text: #F0F0F0;
      --text-muted: #888888;
    }
    
    * { 
      box-sizing: border-box; 
      margin: 0; 
      padding: 0; 
    }

    body {
      background-color: var(--bg-color);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      overflow: hidden;
    }

    /* Page Loader Overlay */
    .page-loader {
      position: fixed;
      inset: 0;
      background: #0c0c0e;
      z-index: 9999;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      transition: opacity 1s cubic-bezier(0.8, 0, 0.2, 1), visibility 1s;
    }

    .page-loader.hidden-loader {
      opacity: 0;
      visibility: hidden;
    }

    .loader-core {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      border: 2px solid rgba(255, 122, 0, 0.1);
      border-top-color: var(--primary);
      animation: spin 1s linear infinite, glowPulse 2s ease-in-out infinite;
    }

    .loader-text {
      margin-top: 24px;
      color: var(--primary);
      font-size: 13px;
      letter-spacing: 6px;
      text-transform: uppercase;
      font-weight: 500;
      animation: pulseText 2s ease-in-out infinite;
    }

    /* Video Background */
    .bg-video {
      position: absolute;
      top: 50%;
      left: 50%;
      min-width: 100%;
      min-height: 100%;
      width: auto;
      height: auto;
      transform: translate(-50%, -50%);
      z-index: -3;
      object-fit: cover;
      opacity: 0.35;
      mix-blend-mode: screen;
      animation: fadeInVideo 3s ease-in-out;
    }

    .video-overlay {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, transparent 0%, rgba(12, 12, 14, 0.95) 100%);
      z-index: -2;
    }

    /* Ambient Light Orbs */
    .bg-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(120px);
      z-index: -1;
      animation: float 14s infinite ease-in-out alternate;
    }

    .orb-1 { 
      width: 500px; 
      height: 500px; 
      background: rgba(255, 122, 0, 0.18); 
      top: -150px; 
      left: -150px; 
    }
    
    .orb-2 { 
      width: 400px; 
      height: 400px; 
      background: rgba(255, 122, 0, 0.12); 
      bottom: -100px; 
      right: -100px; 
      animation-delay: -7s; 
    }

    @keyframes float {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(40px, 60px) scale(1.1); }
    }
    
    @keyframes spin { to { transform: rotate(360deg); } }
    
    @keyframes pulseText { 
      0%, 100% { opacity: 0.5; text-shadow: none; } 
      50% { opacity: 1; text-shadow: 0 0 15px var(--primary-glow); } 
    }

    @keyframes glowPulse {
      0%, 100% { box-shadow: 0 0 20px rgba(255, 122, 0, 0.1); }
      50% { box-shadow: 0 0 40px rgba(255, 122, 0, 0.4); }
    }
    
    @keyframes fadeInVideo {
      from { opacity: 0; }
      to { opacity: 0.35; }
    }

    /* Floating Glassmorphic Container */
    .glass-panel {
      position: relative;
      z-index: 10;
      background: var(--surface);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border: 1px solid var(--surface-border);
      border-radius: 28px;
      padding: 50px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6), inset 0 0 0 1px rgba(255,255,255,0.03);
      transform-style: preserve-3d;
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s ease;
      animation: formEnter 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.5s backwards;
    }

    @keyframes formEnter {
      from { opacity: 0; transform: translateY(40px) scale(0.95); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .glass-panel:hover {
      transform: translateY(-8px) scale(1.01);
      box-shadow: 0 35px 70px rgba(0, 0, 0, 0.8), 0 0 60px var(--primary-glow), inset 0 0 0 1px rgba(255,255,255,0.08);
    }

    /* Typography & Logo */
    .logo-container {
      text-align: center;
      margin-bottom: 35px;
    }

    .logo-container h1 {
      font-weight: 600;
      font-size: 36px;
      letter-spacing: -1px;
      background: linear-gradient(to right, #ffffff, #aaaaaa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      transition: all 0.3s ease;
    }
    
    .logo-container span {
      background: linear-gradient(to right, var(--primary), #FFB74D);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 25px var(--primary-glow);
    }

    /* Google Button */
    .google-btn {
      width: 100%;
      padding: 16px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 14px;
      color: white;
      font-family: inherit;
      font-weight: 500;
      font-size: 15px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      margin-bottom: 15px;
    }

    .google-btn:hover {
      background: rgba(255, 255, 255, 0.08);
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3), 0 0 15px rgba(255, 255, 255, 0.05);
      border-color: rgba(255, 255, 255, 0.2);
    }

    .divider {
      display: flex;
      align-items: center;
      text-align: center;
      margin: 20px 0;
      color: rgba(255, 255, 255, 0.3);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .divider::before { margin-right: 15px; }
    .divider::after { margin-left: 15px; }

    /* Inputs */
    .input-group {
      margin-bottom: 16px;
      position: relative;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1);
      opacity: 1;
      max-height: 100px;
      overflow: hidden;
    }
    
    .input-group.hidden {
      max-height: 0;
      margin-bottom: 0;
      opacity: 0;
      padding: 0;
      border: none;
    }

    .input-group input {
      width: 100%;
      padding: 18px 20px;
      background: rgba(0, 0, 0, 0.25);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      color: white;
      font-family: inherit;
      font-size: 15px;
      transition: all 0.3s ease;
      outline: none;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
    }

    .input-group input::placeholder {
      color: rgba(255,255,255,0.25);
    }

    .input-group input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 20px var(--primary-glow), inset 0 0 8px rgba(255,122,0,0.15);
      background: rgba(0, 0, 0, 0.4);
      transform: translateY(-2px);
    }

    /* Button */
    button.submit-btn {
      width: 100%;
      padding: 18px;
      margin-top: 10px;
      background: linear-gradient(135deg, #FF9A40, var(--primary));
      border: none;
      border-radius: 14px;
      color: white;
      font-family: inherit;
      font-weight: 600;
      font-size: 16px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 10px 25px rgba(255, 122, 0, 0.3);
    }

    button.submit-btn::before {
      content: '';
      position: absolute;
      top: 0; left: -100%; width: 50%; height: 100%;
      background: linear-gradient(to right, transparent, rgba(255,255,255,0.3), transparent);
      transform: skewX(-20deg);
      transition: 0.6s;
    }

    button.submit-btn:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 15px 35px rgba(255, 122, 0, 0.5);
    }

    button.submit-btn:hover::before {
      left: 150%;
    }
    
    button.submit-btn:active {
      transform: translateY(1px) scale(0.98);
      box-shadow: 0 5px 15px rgba(255, 122, 0, 0.3);
    }

    /* Toggles & Messages */
    .toggle-section {
      margin-top: 25px;
      text-align: center;
      font-size: 14px;
      color: var(--text-muted);
    }

    .toggle {
      color: var(--primary);
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s ease;
      margin-left: 6px;
      display: inline-block;
    }

    .toggle:hover {
      color: #FFB74D;
      text-shadow: 0 0 15px var(--primary-glow);
      transform: translateY(-1px);
    }

    #msg {
      margin-top: 20px;
      text-align: center;
      font-size: 14px;
      min-height: 20px;
      color: #ffb4ab;
      text-shadow: 0 0 10px rgba(255, 180, 171, 0.3);
      transition: opacity 0.3s ease;
    }

    /* Popups */
    .popup {
      position: fixed;
      top: -100px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(20, 20, 22, 0.9);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--primary);
      padding: 16px 36px;
      border-radius: 50px;
      color: white;
      font-weight: 600;
      box-shadow: 0 15px 40px var(--primary-glow);
      transition: top 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      z-index: 1000;
      pointer-events: none;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .popup.show {
      top: 40px;
    }

    /* Creator Link */
    .creator-link {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      color: rgba(255, 255, 255, 0.4);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.3s ease;
      z-index: 10;
      letter-spacing: 1px;
      font-weight: 500;
      animation: fadeUp 1s ease-out 1.2s backwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translate(-50%, 20px); }
      to { opacity: 1; transform: translate(-50%, 0); }
    }

    .creator-link:hover {
      color: var(--primary);
      text-shadow: 0 0 15px var(--primary-glow);
      transform: translateX(-50%) translateY(-3px);
    }

    .creator-link svg {
      fill: currentColor;
      width: 16px;
      height: 16px;
      transition: transform 0.3s ease;
    }

    .creator-link:hover svg {
      transform: scale(1.2) rotate(10deg);
    }
  </style>
</head>
<body>

  <!-- Initial Loading Screen -->
  <div class="page-loader" id="page-loader">
    <div class="loader-core"></div>
    <div class="loader-text">Initializing Aura</div>
  </div>

  <!-- Animated Video Background -->
  <video class="bg-video" autoplay loop muted playsinline>
    <source src="https://assets.mixkit.co/videos/preview/mixkit-abstract-technology-connection-background-28864-large.mp4" type="video/mp4">
  </video>
  <div class="video-overlay"></div>

  <!-- Ambient Light Orbs -->
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>

  <!-- Main Login Interface -->
  <div class="glass-panel">
    <div class="logo-container">
      <h1 id="title">Aura<span>Chat</span></h1>
      <p style="color: var(--text-muted); font-size: 14px; margin-top: 8px; font-weight: 300;">Premium Cognitive Interface</p>
    </div>

    <!-- Google Login Button -->
    <button type="button" class="google-btn" onclick="loginWithGoogle()">
      <svg viewBox="0 0 24 24" width="20" height="20" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Continue with Google
    </button>

    <div class="divider">or authenticate via matrix</div>

    <div class="input-group">
      <input type="email" id="email" placeholder="Email Address">
    </div>
    
    <div class="input-group">
      <input type="password" id="password" placeholder="Password">
    </div>
    
    <div class="input-group hidden" id="confirm-group">
      <input type="password" id="confirm" placeholder="Confirm Password">
    </div>

    <button class="submit-btn" onclick="submitForm()" id="submit-btn">Initialize Connection</button>

    <div class="toggle-section">
      <span id="toggle-hint">New to Aura?</span>
      <span class="toggle" onclick="toggleMode()">Request Access</span>
    </div>

    <p id="msg"></p>
  </div>

  <!-- Creator Link -->
  <a href="https://www.instagram.com/takadori12?igsh=Mm5rZWQ5ZXl1bm85" target="_blank" class="creator-link">
    ARCHITECTED BY TAKADORI
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
      <path d="M12 2c2.717 0 3.056.01 4.122.06 1.065.05 1.79.217 2.428.465.66.254 1.216.598 1.772 1.153.555.556.9 1.11 1.152 1.772.247.637.415 1.363.465 2.428.047 1.066.06 1.405.06 4.122 0 2.717-.01 3.056-.06 4.122-.05 1.065-.218 1.79-.465 2.428a4.883 4.883 0 0 1-1.152 1.772c-.556.555-1.11.9-1.772 1.152-.637.247-1.363.415-2.428.465-1.066.047-1.405.06-4.122.06-2.717 0-3.056-.01-4.122-.06-1.065-.05-1.79-.218-2.428-.465a4.89 4.89 0 0 1-1.772-1.152 4.904 4.904 0 0 1-1.153-1.772c-.248-.637-.415-1.363-.465-2.428C2.013 15.056 2 14.717 2 12c0-2.717.01-3.056.06-4.122.05-1.066.217-1.79.466-2.428a4.89 4.89 0 0 1 1.153-1.772c.556-.556 1.11-.9 1.772-1.153.638-.248 1.363-.415 2.428-.465C8.944 2.013 9.283 2 12 2zm0 5a5 5 0 1 0 0 10 5 5 0 0 0 0-10zm6.5-.25a1.25 1.25 0 1 0-2.5 0 1.25 1.25 0 0 0 2.5 0zM12 9a3 3 0 1 1 0 6 3 3 0 0 1 0-6z"/>
    </svg>
  </a>

  <!-- Notification Overlay -->
  <div class="popup" id="popup">
    <div class="popup-spinner hidden" id="popup-spinner" style="width: 16px; height: 16px; border: 2px solid white; border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite;"></div>
    <span id="popup-text"></span>
  </div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

// Handle Loading Screen
window.addEventListener('load', () => {
  setTimeout(() => {
    document.getElementById('page-loader').classList.add('hidden-loader');
  }, 1000); // 1s visual cinematic delay
});

// 🔑 PUT YOUR ANON KEY ONLY
const supabase = createClient(
  "https://hyjmupysbwxzvialjysd.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh5am11cHlzYnd4enZpYWxqeXNkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3MTY4MzQsImV4cCI6MjA5MDI5MjgzNH0.9R90wtlzW6UGidSqFrhKByxNZRnwKccB4FSnrnjHBb0"
)

let isLogin = true
const targetRedirectURL = "https://Takadori-galaxy.vercel.app/AuraChat.html";

window.loginWithGoogle = async () => {
  showPopup("Initializing Google OAuth Protocol...", true);
  const { data, error } = await supabase.auth.signInWithOAuth({
    provider: 'google',
    options: {
      redirectTo: targetRedirectURL
    }
  })
  
  if (error) {
    showPopup("Google Auth Failed: " + error.message, false);
  }
}

window.toggleMode = () => {
  isLogin = !isLogin

  // Animate title change
  const title = document.getElementById("title");
  title.style.opacity = 0;
  
  setTimeout(() => {
    title.innerHTML = isLogin ? "Aura<span>Chat</span>" : "Join <span>Aura</span>"
    title.style.opacity = 1;
  }, 150);

  document.getElementById("toggle-hint").innerText = isLogin ? "New to Aura?" : "Already hold an access key?"
  document.querySelector(".toggle").innerText = isLogin ? "Request Access" : "Authenticate"
  document.getElementById("submit-btn").innerText = isLogin ? "Initialize Connection" : "Authorize Creation"

  // Toggle Confirm Password field with animation
  document.getElementById("confirm-group").classList.toggle("hidden", isLogin)
  
  // Clear any existing messages
  document.getElementById("msg").innerText = "";
  document.getElementById("password").value = "";
  document.getElementById("confirm").value = "";
}

function showPopup(text, isProcessing = false) {
  const popup = document.getElementById("popup")
  const popupText = document.getElementById("popup-text")
  const popupSpinner = document.getElementById("popup-spinner")
  
  popupText.innerText = text
  
  if (isProcessing) {
    popupSpinner.classList.remove("hidden")
    popupSpinner.style.display = "block"
  } else {
    popupSpinner.style.display = "none"
  }

  popup.classList.add("show")

  if (!isProcessing) {
    setTimeout(() => {
      popup.classList.remove("show")
    }, 3000)
  }
}

window.submitForm = async () => {
  const email = document.getElementById("email").value
  const password = document.getElementById("password").value
  const confirm = document.getElementById("confirm").value
  const msg = document.getElementById("msg")
  const btn = document.getElementById("submit-btn")
  const originalBtnText = btn.innerText

  msg.innerText = ""
  
  // Animate button during processing
  btn.innerText = "Encrypting link..."
  btn.style.opacity = 0.8
  btn.style.transform = "scale(0.98)"
  
  showPopup("Establishing secure connection...", true)

  try {
    if (!email || !password) {
      document.getElementById("popup").classList.remove("show")
      msg.innerText = "Please provide all required core credentials."
      return
    }

    // REGISTER
    if (!isLogin) {
      if (password !== confirm) {
        document.getElementById("popup").classList.remove("show")
        msg.innerText = "Security keys do not match."
        return
      }

      const { data, error } = await supabase.auth.signUp({
        email,
        password
      })

      if (error) {
        document.getElementById("popup").classList.remove("show")
        msg.innerText = error.message
      } else {
        showPopup("Access Granted: Routing to Aura...", true)

        // insert profile safely
        if (data?.user) {
          await supabase.from("profiles").insert({
            id: data.user.id,
            username: email.split("@")[0]
          })
        }
        
        setTimeout(() => {
          window.location.href = targetRedirectURL;
        }, 1200);
      }
    }
    
    // LOGIN
    else {
      const { error } = await supabase.auth.signInWithPassword({
        email,
        password
      })

      if (error) {
        document.getElementById("popup").classList.remove("show")
        msg.innerText = error.message
      } else {
        showPopup("Authentication Verified ✅ Routing...", true)
        
        setTimeout(() => {
          window.location.href = targetRedirectURL;
        }, 1200);
      }
    }
  } catch (err) {
    document.getElementById("popup").classList.remove("show")
  } finally {
    setTimeout(() => {
      btn.innerText = originalBtnText
      btn.style.opacity = 1
      btn.style.transform = "none"
    }, 800)
  }
}
</script>

</body>
</html>
