<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - 4-Player Chess Arena</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-primary: #050508;
            --bg-card: rgba(10, 12, 18, 0.7);
            --text-primary: #ffffff;
            --text-secondary: #8888aa;

            --accent-blue: #00e5ff;
            --accent-red: #ff2a5f;
            --accent-green: #00ff88;

            --glow-blue: rgba(0, 229, 255, 0.5);
            --glow-red: rgba(255, 42, 95, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* ─── FULL PAGE CHESSBOARD BACKGROUND ─── */
        #bg-board {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 150vw;
            height: 150vw;
            min-width: 1500px;
            min-height: 1500px;
            transform: translate(-50%, -50%) perspective(1000px) rotateX(45deg);
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            z-index: 0;
            opacity: 0.15;
            pointer-events: none;
            /* Cool floating movement */
            animation: boardBreath 15s ease-in-out infinite alternate;
        }

        @keyframes boardBreath {
            0% {
                transform: translate(-50%, -40%) perspective(1000px) rotateX(50deg) rotateZ(-5deg);
            }

            100% {
                transform: translate(-50%, -60%) perspective(1000px) rotateX(40deg) rotateZ(5deg);
            }
        }

        .bg-square {
            width: 100%;
            height: 100%;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.5s ease;
        }

        .bg-square.dark {
            background: rgba(0, 229, 255, 0.08);
        }

        .bg-square.light {
            background: transparent;
        }

        .bg-square.highlight {
            background: var(--glow-blue) !important;
            box-shadow: 0 0 50px var(--accent-blue);
        }

        .bg-square.highlight-red {
            background: var(--glow-red) !important;
            box-shadow: 0 0 50px var(--accent-red);
        }

        /* Dark edge vignette */
        .vignette {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle, transparent 20%, #000 80%);
            z-index: 1;
            pointer-events: none;
        }

        /* ─── 3D CARD CONTAINER ─── */
        .flip-container {
            perspective: 1500px;
            width: 100%;
            max-width: 460px;
            margin: 0 20px;
            z-index: 10;
        }

        .flip-card {
            width: 100%;
            position: relative;
            transition: transform 1.2s cubic-bezier(0.2, 0.8, 0.2, 1);
            transform-style: preserve-3d;
        }

        .flip-container.flipped .flip-card {
            transform: rotateY(180deg);
        }

        .card-face {
            width: 100%;
            background: var(--bg-card);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-top: 1px solid rgba(255, 255, 255, 0.3);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 50px 40px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.9), inset 0 2px 2px rgba(255, 255, 255, 0.1);
            position: relative;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
        }

        .card-back {
            position: absolute;
            top: 0;
            left: 0;
            transform: rotateY(180deg);
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.2rem;
            letter-spacing: 4px;
            margin-bottom: 5px;
            text-align: center;
            color: #fff;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.4);
        }

        p.subtitle {
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-bottom: 40px;
            letter-spacing: 1.5px;
        }

        /* ─── PAWN TRACKER & INPUTS ─── */
        .input-group {
            margin-bottom: 30px;
            position: relative;
        }

        .input-group label {
            display: block;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            font-weight: 600;
        }

        /* Mini chessboard track above input */
        .pawn-track {
            position: relative;
            width: 100%;
            height: 30px;
            margin-bottom: -5px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
            display: flex;
        }

        .track-squares {
            display: flex;
            width: 100%;
            height: 8px;
            align-self: flex-end;
            opacity: 0.3;
        }

        .track-squares span {
            flex: 1;
            background: #2a2a40;
        }

        .track-squares span:nth-child(even) {
            background: #121220;
        }

        /* The Moving Pawn */
        .pawn-piece {
            position: absolute;
            left: 15px;
            bottom: 15px;
            font-size: 24px;
            color: gold;
            text-shadow: 0 0 10px rgba(197, 160, 89, 0.5);
            transition: left 0.15s steps(20, end); /* Snaps to steps */
            pointer-events: none;
            z-index: 3;
        }

        .card-front .pawn-piece {
            color: var(--accent-blue);
            text-shadow: 0 0 15px var(--glow-blue);
        }

        .card-back .pawn-piece {
            color: var(--accent-red);
            text-shadow: 0 0 15px var(--glow-red);
        }

        /* The jump animation triggers every keystroke */
        @keyframes hopAnim {
            0% {
                transform: translateY(0) scale(1);
            }

            40% {
                transform: translateY(-16px) scale(1.1);
                filter: brightness(1.5);
            }

            100% {
                transform: translateY(0) scale(1);
            }
        }

        .pawn-piece.hop {
            animation: hopAnim 0.25s ease-out;
        }

        .input-wrapper {
            position: relative;
            width: 100%;
        }

        .input-group input {
            width: 100%;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-top: none;
            /* Merges with track */
            color: var(--text-primary);
            padding: 16px 18px;
            border-radius: 0 0 12px 12px;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .card-front .input-group input:focus {
            background: rgba(0, 229, 255, 0.05);
            border-color: rgba(0, 229, 255, 0.4);
            box-shadow: 0 10px 20px rgba(0, 229, 255, 0.1);
        }

        .card-back .input-group input:focus {
            background: rgba(255, 42, 95, 0.05);
            border-color: rgba(255, 42, 95, 0.4);
            box-shadow: 0 10px 20px rgba(255, 42, 95, 0.1);
        }

        /* ─── BUTTONS ─── */
        .btn {
            width: 100%;
            padding: 18px;
            color: #fff;
            border: none;
            border-radius: 12px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: 4px;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.3), transparent);
            transform: skewX(-20deg);
            transition: 0.6s;
        }

        .btn:hover::after {
            left: 150%;
        }

        .btn:active {
            transform: scale(0.96);
        }

        .btn-login {
            background: var(--accent-blue);
            color: #000;
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.4);
        }

        .btn-login:hover {
            box-shadow: 0 0 50px rgba(0, 229, 255, 0.6);
            background: #fff;
        }

        .btn-register {
            background: var(--accent-red);
            box-shadow: 0 0 30px rgba(255, 42, 95, 0.4);
        }

        .btn-register:hover {
            box-shadow: 0 0 50px rgba(255, 42, 95, 0.6);
            background: #fff;
        }

        .auth-error {
            color: var(--accent-red);
            font-size: 0.85rem;
            margin-top: 15px;
            text-align: center;
            opacity: 0;
            transform: translateY(-5px);
            transition: all 0.3s ease;
            text-shadow: 0 0 10px rgba(255, 42, 95, 0.5);
            font-weight: 600;
        }

        .auth-error.show {
            opacity: 1;
            transform: translateY(0);
        }

        .switch-mode {
            margin-top: 30px;
            text-align: center;
            font-size: 0.9rem;
            color: var(--text-muted);
            cursor: pointer;
        }

        .switch-mode span {
            color: #fff;
            font-weight: 500;
            transition: all 0.3s ease;
            text-decoration: underline;
            text-underline-offset: 4px;
        }

        .card-front .switch-mode:hover span {
            color: var(--accent-blue);
        }

        .card-back .switch-mode:hover span {
            color: var(--accent-red);
        }

        .spinner {
            display: none;
            width: 22px;
            height: 22px;
            border: 3px solid rgba(0, 0, 0, 0.1);
            border-radius: 50%;
            border-top-color: currentColor;
            animation: spin 0.8s linear infinite;
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }

        .btn-login .spinner {
            border-top-color: #000;
        }

        .btn-register .spinner {
            border-top-color: #fff;
        }

        @keyframes spin {
            to {
                transform: translate(-50%, -50%) rotate(360deg);
            }
        }

        .btn.loading .btn-text {
            opacity: 0;
        }

        .btn.loading .spinner {
            display: block;
        }
    </style>
</head>

<body>

    <!-- Giant Interactive Background Chessboard -->
    <div id="bg-board"></div>
    <div class="vignette"></div>

    <div class="flip-container" id="flip-container">
        <div class="flip-card">

            <!-- FRONT: LOGIN -->
            <div class="card-face card-front">
                <h2>CHESS ARENA</h2>
                <p class="subtitle">Secure Login Protocol</p>

                <div class="input-module">
                    <label class="input-label">Gmail Address</label>
                    <div class="track-container">
                        <span class="pawn-piece" id="pawn-email">♚</span>
                        <input type="email" id="email" placeholder="master@chess.com" oninput="trackTyping(this, 'pawn-email')">
                    </div>
                </div>

                <div class="input-module">
                    <label class="input-label">Access Password</label>
                    <div class="track-container">
                        <span class="pawn-piece" id="pawn-pass">♛</span>
                        <input type="password" id="password" placeholder="••••••••" oninput="trackTyping(this, 'pawn-pass')">
                    </div>
                </div>

                <button class="btn btn-login" id="login-btn" onclick="handleLogin()">
                    <span class="btn-text">AUTHENTICATE</span>
                    <div class="spinner"></div>
                </button>
                <div class="auth-error" id="login-error"></div>

                <div class="switch-mode" onclick="toggleFlip()">
                    No clearance? <span>Initiate Registration</span>
                </div>
            </div>

            <!-- BACK: REGISTER -->
            <div class="card-face card-back">
                <h2>ENLIST NOW</h2>
                <p class="subtitle">Secure your spot on the board</p>

                <div class="input-module">
                    <label class="input-label">Gmail Address</label>
                    <div class="track-container">
                        <span class="pawn-piece" id="pawn-reg-email">♚</span>
                        <input type="email" id="reg-email" placeholder="new.commander@team.com" oninput="trackTyping(this, 'pawn-reg-email')">
                    </div>
                </div>

                <div class="input-module">
                    <label class="input-label">Access Password</label>
                    <div class="track-container">
                        <span class="pawn-piece" id="pawn-reg-pass">♛</span>
                        <input type="password" id="reg-password" placeholder="••••••••" oninput="trackTyping(this, 'pawn-reg-pass')">
                    </div>
                </div>

                <div class="input-module">
                    <label class="input-label">Confirm Password</label>
                    <div class="track-container">
                        <span class="pawn-piece" id="pawn-confirm">♚</span>
                        <input type="password" id="reg-confirm-password" placeholder="••••••••" oninput="trackTyping(this, 'pawn-confirm')">
                    </div>
                </div>

                <button class="btn btn-register" id="reg-btn" onclick="handleRegister()">
                    <span class="btn-text">INITIALIZE PROFILE</span>
                    <div class="spinner"></div>
                </button>
                <div class="auth-error" id="reg-error"></div>

                <div class="switch-mode" onclick="toggleFlip()">
                    Already enlisted? <span>Return to Login</span>
                </div>
            </div>

        </div>
    </div>

    <script>
        // ─── BACKGROUND BOARD GENERATOR ───
        const bgBoard = document.getElementById('bg-board');
        const bgSquares = [];
        for (let r = 0; r < 8; r++) {
            for (let c = 0; c < 8; c++) {
                const sq = document.createElement('div');
                sq.className = 'bg-square ' + ((r + c) % 2 === 0 ? 'dark' : 'light');
                bgBoard.appendChild(sq);
                bgSquares.push(sq);
            }
        }

        // ─── PAWN TYPING ANIMATION ───
        // Typing Tracker
        function trackTyping(input, pawnId) {
            const pawn = document.getElementById(pawnId);
            const val = input.value;
            const containerWidth = input.parentElement.offsetWidth - 40; // Track width
            
            // Step-by-step movement (20 steps total)
            const MAX_STEPS = 20;
            const currentStep = Math.min(val.length, MAX_STEPS);
            const stepSize = containerWidth / MAX_STEPS;
            
            // Stay where we type: piece moves to the position of the character being typed
            const leftPos = 15 + (currentStep * stepSize);
            
            pawn.style.left = leftPos + 'px';
            
            // Hop Animation (The "Step")
            pawn.classList.remove('hop');
            void pawn.offsetWidth; 
            pawn.classList.add('hop');

            // Flash random board square with mode colors
            flashBoard();
        }

        function flashBoard() {
            const squares = document.querySelectorAll('.bg-square');
            const randIdx = Math.floor(Math.random() * squares.length);
            const sq = squares[randIdx];
            const isLogin = !flipContainer.classList.contains('flipped');
            const highlightClass = isLogin ? 'highlight' : 'highlight-red';
            sq.classList.add(highlightClass);
            setTimeout(() => sq.classList.remove(highlightClass), 400);
        }

        const SUPABASE_URL = 'https://ihxgnifivmnxjbevqiqk.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImloeGduaWZpdm1ueGpiZXZxaXFrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwNTk5NTksImV4cCI6MjA5MTYzNTk1OX0.vbmPR1qzcwu0ZuE-frsh1JDpgozfHl3lg0bu_19sxqA';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const flipContainer = document.getElementById('flip-container');

        // --- NEW USER LOCAL STORAGE CHECK ---
        if (!localStorage.getItem('chess_auth_visited')) {
            flipContainer.classList.add('flipped');
        }

        function toggleFlip() {
            flipContainer.classList.toggle('flipped');
            showError('login', '');
            showError('reg', '');
        }

        function showError(type, message) {
            const errDiv = document.getElementById(`${type}-error`);
            errDiv.textContent = message;
            if (message) errDiv.classList.add('show');
            else errDiv.classList.remove('show');
        }

        function setBtnLoading(type, isLoading) {
            const btn = document.getElementById(`${type}-btn`);
            if (isLoading) btn.classList.add('loading');
            else btn.classList.remove('loading');
        }

        // Auth Logic
        async function handleLogin() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;

            if (!email || !password) { showError('login', 'Please provide credentials.'); return; }

            setBtnLoading('login', true);
            showError('login', '');

            try {
                const { data: authData, error } = await supabaseClient.auth.signInWithPassword({ email, password });
                if (error) throw error;

                localStorage.setItem('chess_auth_visited', 'true');
                const username = email.split('@')[0].toUpperCase();
                await supabaseClient.from('profiles').upsert({ id: authData.user.id, username: username });

                // Success flash all squares
                bgSquares.forEach(sq => sq.classList.add('highlight'));

                document.body.style.opacity = '0';
                document.body.style.transition = 'opacity 0.5s ease';
                setTimeout(() => { window.location.href = 'chesshome.html'; }, 500);
            } catch (error) {
                showError('login', error.message);
                setBtnLoading('login', false);
            }
        }

        async function handleRegister() {
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-password').value;
            const confirmPassword = document.getElementById('reg-confirm-password').value;

            if (!email || !password || !confirmPassword) { showError('reg', 'Complete all fields.'); return; }
            if (password !== confirmPassword) { showError('reg', 'Passwords do not match.'); return; }
            if (password.length < 6) { showError('reg', 'Access code must be at least 6 characters.'); return; }

            setBtnLoading('reg', true);
            showError('reg', '');

            try {
                const { data: authData, error } = await supabaseClient.auth.signUp({ email, password });
                if (error) throw error;

                localStorage.setItem('chess_auth_visited', 'true');
                const username = email.split('@')[0].toUpperCase();
                await supabaseClient.from('profiles').upsert({ id: authData.user.id, username: username });

                const btn = document.getElementById('reg-btn');
                btn.classList.remove('loading');
                btn.querySelector('.btn-text').textContent = 'SUCCESS!';
                btn.style.background = 'var(--accent-green)';

                bgSquares.forEach(sq => sq.classList.add('highlight-red'));

                document.body.style.opacity = '0';
                document.body.style.transition = 'opacity 0.8s ease 0.5s';
                setTimeout(() => { window.location.href = 'chesshome.html'; }, 1000);
            } catch (error) {
                showError('reg', error.message);
                setBtnLoading('reg', false);
            }
        }

        // Submitting with Enter Key
        document.getElementById('login-password').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') handleLogin();
        });
        document.getElementById('reg-confirm-password').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') handleRegister();
        });

        // Check Session
        async function checkSession() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                localStorage.setItem('chess_auth_visited', 'true');
                document.body.style.opacity = '0';
                window.location.href = 'chesshome.html';
            }
        }
        checkSession();
    </script>
</body>

</html>
