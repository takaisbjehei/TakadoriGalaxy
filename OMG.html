<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Subway Station - Multiplayer</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #000; 
            font-family: sans-serif; 
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }
        #info {
            position: absolute; top: 20px; width: 100%; text-align: center;
            color: #fff; text-shadow: 0px 2px 5px rgba(0,0,0,1); font-size: 16px; pointer-events: none; z-index: 10;
        }
        #crosshair {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: rgba(255,255,255,0.3); font-size: 20px; pointer-events: none;
        }

        /* --- Mobile UI Styles --- */
        #mobile-ui {
            position: absolute; bottom: 30px; width: 100%;
            display: flex; justify-content: space-between; padding: 0 30px;
            box-sizing: border-box; pointer-events: none; z-index: 100;
        }
        .ui-group { pointer-events: auto; display: flex; flex-direction: column; align-items: center; }
        .dpad-row { display: flex; justify-content: center; }
        .ctrl-btn {
            width: 60px; height: 60px; margin: 5px;
            background: rgba(255, 255, 255, 0.15); border: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 50%; color: white; font-size: 24px; font-weight: bold;
            display: flex; justify-content: center; align-items: center;
            backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
            cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .ctrl-btn:active, .ctrl-btn.active { background: rgba(255, 255, 255, 0.5); transform: scale(0.95); }
        .action-btn { width: 80px; height: 80px; font-size: 16px; margin-top: 65px; }
        @media (min-width: 1024px) { #mobile-ui { opacity: 0.5; } }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="info"><b>Multiplayer Subway</b> | Walk to the ends to see the sky!</div>
    <div id="crosshair">+</div>

    <div id="mobile-ui">
        <div class="ui-group" id="dpad">
            <div class="ctrl-btn" id="btn-w">▲</div>
            <div class="dpad-row">
                <div class="ctrl-btn" id="btn-a">◀</div>
                <div class="ctrl-btn" id="btn-s">▼</div>
                <div class="ctrl-btn" id="btn-d">▶</div>
            </div>
        </div>
        <div class="ui-group" id="action-pad">
            <div class="ctrl-btn action-btn" id="btn-shift">SPRINT</div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        // Import Supabase Client
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/+esm';

        // --- SUPABASE SETUP ---
        const SUPABASE_URL = 'https://jtvzlockqehfdopgargp.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp0dnpsb2NrcWVoZmRvcGdhcmdwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3Mzg4NDEsImV4cCI6MjA4NzMxNDg0MX0.IzpZrP7o45VmRuCr90UpwZ-T6xE4cBVsk1KUtUBTflc';
        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);
        
        // Generate a random ID for this player's session
        const myPlayerId = crypto.randomUUID();
        const networkPlayers = {}; // Store other players' meshes here

        // 1. Scene & Camera Setup
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x0a1018, 0.008); 
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        document.body.appendChild(renderer.domElement);

        // 2. Post-Processing (Bloom)
        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
        bloomPass.threshold = 1.2; bloomPass.strength = 1.2; bloomPass.radius = 0.5;
        const composer = new EffectComposer(renderer);
        composer.addPass(renderScene); composer.addPass(bloomPass);

        // 3. Environment Materials & Build (Simplified for brevity)
        const wallMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.9 });
        const metalMat = new THREE.MeshStandardMaterial({ color: 0x444444, metalness: 0.9, roughness: 0.4 });
        const neonBlueMat = new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0x0088ff, emissiveIntensity: 2.5 });
        
        // Tunnel
        const tunnelGeo = new THREE.CylinderGeometry(16, 16, 80, 32, 1, true, 0, Math.PI);
        const tunnel = new THREE.Mesh(tunnelGeo, wallMat);
        tunnel.rotation.x = Math.PI / 2; tunnel.material.side = THREE.BackSide; 
        scene.add(tunnel);
        
        // Platform
        const platform = new THREE.Mesh(new THREE.BoxGeometry(12, 2, 150), new THREE.MeshStandardMaterial({color: 0x222222}));
        platform.position.set(7, 1, 0); scene.add(platform);

        // Lighting
        scene.add(new THREE.AmbientLight(0x1a2b4c, 0.6));
        for(let i = -30; i <= 30; i += 15) {
            const pointLight = new THREE.PointLight(0xddeeff, 60, 25);
            pointLight.position.set(6, 11.5, i);
            scene.add(pointLight);
        }

        // --- PLAYER & MULTIPLAYER LOGIC ---
        
        // Function to build a player model
        function createPlayerModel(colorBody = 0x111111, colorHead = 0xffddcc) {
            const group = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.7, 1.4, 0.4), new THREE.MeshStandardMaterial({ color: colorBody }));
            body.position.y = 2.7; group.add(body);
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.4, 0.4), new THREE.MeshStandardMaterial({ color: colorHead }));
            head.position.y = 3.7; group.add(head);
            return group;
        }

        // My Player
        const player = createPlayerModel(0x111111, 0xffddcc);
        player.position.set(6, 0, 0); 
        player.rotation.y = Math.PI;
        scene.add(player);

        // Supabase Realtime Channel
        const channel = supabase.channel('subway-room', {
            config: {
                broadcast: { self: false },
                presence: { key: myPlayerId },
            },
        });

        // Listen for new players joining/leaving
        channel.on('presence', { event: 'sync' }, () => {
            const state = channel.presenceState();
            const activeIds = Object.keys(state);

            // Remove players who left
            for (let id in networkPlayers) {
                if (!activeIds.includes(id)) {
                    scene.remove(networkPlayers[id]);
                    delete networkPlayers[id];
                }
            }

            // Add new players
            for (let id of activeIds) {
                if (id !== myPlayerId && !networkPlayers[id]) {
                    // Create network player with a slightly blue body to stand out
                    const netPlayer = createPlayerModel(0x004488, 0xffccaa);
                    scene.add(netPlayer);
                    networkPlayers[id] = netPlayer;
                }
            }
        });

        // Listen for movement broadcasts from others
        channel.on('broadcast', { event: 'move' }, (payload) => {
            const data = payload.payload;
            const netPlayer = networkPlayers[data.id];
            if (netPlayer) {
                // Update their position and rotation
                netPlayer.position.set(data.x, data.y, data.z);
                netPlayer.rotation.y = data.ry;
            }
        });

        // Subscribe to the channel
        channel.subscribe(async (status) => {
            if (status === 'SUBSCRIBED') {
                // Track presence so others know we are here
                await channel.track({ online_at: new Date().toISOString() });
                
                // Optional: Insert player into SQL DB on join
                await supabase.from('players').insert([{ id: myPlayerId, x: 6, z: 0 }]);
            }
        });

        // Controls Logic
        const keys = { w: false, a: false, s: false, d: false, shift: false };
        document.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'w' || key === 'arrowup') keys.w = true;
            if (key === 'a' || key === 'arrowleft') keys.a = true;
            if (key === 's' || key === 'arrowdown') keys.s = true;
            if (key === 'd' || key === 'arrowright') keys.d = true;
            if (key === 'shift') keys.shift = true;
        });
        document.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'w' || key === 'arrowup') keys.w = false;
            if (key === 'a' || key === 'arrowleft') keys.a = false;
            if (key === 's' || key === 'arrowdown') keys.s = false;
            if (key === 'd' || key === 'arrowright') keys.d = false;
            if (key === 'shift') keys.shift = false;
        });

        function setupTouchButton(buttonId, keyName) {
            const btn = document.getElementById(buttonId);
            const press = (e) => { e.preventDefault(); keys[keyName] = true; btn.classList.add('active'); };
            const release = (e) => { e.preventDefault(); keys[keyName] = false; btn.classList.remove('active'); };
            btn.addEventListener('touchstart', press, { passive: false });
            btn.addEventListener('touchend', release, { passive: false });
            btn.addEventListener('mousedown', press);
            btn.addEventListener('mouseup', release);
            btn.addEventListener('mouseleave', release);
        }
        setupTouchButton('btn-w', 'w'); setupTouchButton('btn-a', 'a');
        setupTouchButton('btn-s', 's'); setupTouchButton('btn-d', 'd');
        setupTouchButton('btn-shift', 'shift');

        // Resize handler
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });

        const currentCamPos = new THREE.Vector3();
        const currentLookAt = new THREE.Vector3();
        
        // Track last sent position to avoid spamming the network
        const lastSentPos = new THREE.Vector3();
        let lastSentRot = 0;

        // Animation Loop
        function animate() {
            requestAnimationFrame(animate);

            const moveSpeed = keys.shift ? 0.2 : 0.08;
            const turnSpeed = 0.04;

            if (keys.w) player.translateZ(moveSpeed);
            if (keys.s) player.translateZ(-moveSpeed);
            if (keys.a) player.rotation.y += turnSpeed;
            if (keys.d) player.rotation.y -= turnSpeed;

            // Boundaries
            if (player.position.x > 12) player.position.x = 12;
            if (player.position.x < 2.5) player.position.x = 2.5; 
            if (player.position.z > 70) player.position.z = 70;
            if (player.position.z < -70) player.position.z = -70;

            // Broadcast movement to network if player moved significantly
            if (lastSentPos.distanceTo(player.position) > 0.05 || Math.abs(lastSentRot - player.rotation.y) > 0.05) {
                channel.send({
                    type: 'broadcast',
                    event: 'move',
                    payload: {
                        id: myPlayerId,
                        x: player.position.x,
                        y: player.position.y,
                        z: player.position.z,
                        ry: player.rotation.y
                    }
                });
                lastSentPos.copy(player.position);
                lastSentRot = player.rotation.y;
            }

            // Camera follow
            const idealOffset = new THREE.Vector3(1.5, 4.5, -5); 
            idealOffset.applyQuaternion(player.quaternion);
            idealOffset.add(player.position);

            const idealLookAt = new THREE.Vector3(0, 3, 10); 
            idealLookAt.applyQuaternion(player.quaternion);
            idealLookAt.add(player.position);

            currentCamPos.lerp(idealOffset, 0.1);
            currentLookAt.lerp(idealLookAt, 0.1);

            camera.position.copy(currentCamPos);
            camera.lookAt(currentLookAt);

            composer.render();
        }

        animate();
    </script>
</body>
</html>
