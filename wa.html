<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unlock Download Link</title>

    <!-- Google Fonts: Poppins -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Icons and Confetti Animations -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --bg-color: #0b0f19;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --primary: #00f0ff;
            --primary-glow: rgba(0, 240, 255, 0.5);
            --success: #00ff88;
            --success-glow: rgba(0, 255, 136, 0.5);
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --card-hover: rgba(255, 255, 255, 0.06);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Subtle glowing orbs in the background */
            background-image:
                radial-gradient(circle at 15% 50%, rgba(0, 240, 255, 0.08), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(0, 255, 136, 0.08), transparent 25%);
            padding: 2rem 1rem;
        }

        /* Main Container setup with Glassmorphism */
        .container {
            max-width: 600px;
            width: 100%;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #ffffff, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        /* Progress Bar Styles */
        .progress-wrapper {
            margin-bottom: 2.5rem;
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.8rem;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .progress-bar-bg {
            width: 100%;
            height: 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--primary), #00ffcc);
            border-radius: 10px;
            transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 10px var(--primary-glow);
        }

        /* Action Cards Section */
        .cards {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 2.5rem;
        }

        .card {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            padding: 1rem 1.25rem;
            border-radius: 16px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-2px);
            background: var(--card-hover);
            border-color: rgba(255, 255, 255, 0.15);
            box-shadow: 0 10px 20px -10px rgba(0, 0, 0, 0.3);
        }

        .card-icon {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 48px;
            height: 48px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            margin-right: 1.25rem;
            transition: all 0.3s ease;
        }

        .card-content {
            flex-grow: 1;
        }

        .card-content h3 {
            font-size: 1.05rem;
            font-weight: 600;
            margin-bottom: 0.2rem;
        }

        .card-content p {
            font-size: 0.8rem;
        }

        .action-btn {
            background: transparent;
            color: var(--primary);
            border: 1px solid var(--primary);
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .action-btn:hover {
            background: var(--primary);
            color: #000;
            box-shadow: 0 0 15px var(--primary-glow);
        }

        /* Completed State Styles */
        .card.completed .card-icon {
            background: var(--success-glow);
            color: var(--success);
        }

        .card.completed .action-btn {
            background: var(--success);
            color: #0b0f19;
            border-color: var(--success);
            box-shadow: 0 0 15px var(--success-glow);
            pointer-events: none;
            /* Prevent clicking again */
        }

        /* The Unlock Button Area */
        .unlock-section {
            text-align: center;
        }

        .download-btn {
            width: 100%;
            padding: 1.2rem;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 12px;
            border: none;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-muted);
            cursor: not-allowed;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.4s ease;
        }

        .download-btn.unlocked {
            background: linear-gradient(135deg, var(--primary), var(--success));
            color: #000;
            cursor: pointer;
            box-shadow: 0 0 25px var(--success-glow);
            animation: pulse 2s infinite;
        }

        /* Glowing animation for unlocked state */
        @keyframes pulse {
            0% {
                box-shadow: 0 0 15px var(--success-glow);
            }

            50% {
                box-shadow: 0 0 35px var(--success-glow);
            }

            100% {
                box-shadow: 0 0 15px var(--success-glow);
            }
        }

        .success-msg {
            margin-top: 1.5rem;
            font-weight: 600;
            color: var(--success);
            font-size: 1.1rem;
            display: none;
            animation: fadeIn 0.5s ease;
        }

        /* Links Box at the end - For unlocked content display */
        .links-box {
            margin-top: 1.5rem;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 1.5rem;
            text-align: left;
            display: none;
            /* Hidden by default */
            animation: fadeIn 0.5s ease;
        }

        .links-box label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .links-box .url-input {
            width: 100%;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 0.8rem 1rem;
            border-radius: 8px;
            font-family: monospace;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.3s;
        }

        .links-box .url-input:focus {
            border-color: var(--primary);
        }

        .reset-link {
            display: block;
            text-align: center;
            margin-top: 2rem;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.3);
            text-decoration: none;
            cursor: pointer;
        }

        .reset-link:hover {
            color: var(--text-muted);
        }

        @media (max-width: 480px) {
            .container {
                padding: 1.5rem;
            }

            h1 {
                font-size: 1.5rem;
            }

            .card {
                padding: 0.8rem 1rem;
            }

            .card-icon {
                width: 40px;
                height: 40px;
                margin-right: 1rem;
            }
        }

        /* Checkmark drawing animation */
        .check-anim {
            stroke-dasharray: 50;
            stroke-dashoffset: 50;
            animation: drawCheck 0.5s ease forwards;
        }

        @keyframes drawCheck {
            to {
                stroke-dashoffset: 0;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <header>
            <h1>Complete Actions to Unlock</h1>
            <p>Please complete all the steps below to get your download link.</p>
        </header>

        <div class="progress-wrapper">
            <div class="progress-info">
                <span>Your Progress</span>
                <span id="progress-text">0%</span>
            </div>
            
            <div class="progress-bar-bg">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
        </div>

        <div class="cards" id="tasks-container">
            <!-- Action Cards will be injected by JavaScript -->
        </div>

        <div class="unlock-section">
            <button id="download-btn" class="download-btn" disabled>
                <i data-lucide="lock" id="lock-icon"></i> <span id="btn-text">Download Locked</span>
            </button>
            <div id="success-msg" class="success-msg">
                Download Unlocked 🎉
            </div>

            <!-- Box revealed after 100% completion to paste/show links -->
            <div id="links-box" class="links-box">
                <label for="final-link">Your Direct Download Link:</label>
                <input type="text" id="final-link" class="url-input"
                    value="https://example.com/your-hidden-unlocked-file.zip" readonly onclick="this.select()">
            </div>
        </div>

        <!-- Utility for testing -->
        <a class="reset-link" onclick="resetProgress()">Reset Progress (for testing)</a>
    </div>

    <script>
        // ==========================================
        // CONTENT CONFIGURATION (Edit links here)
        // ==========================================
        const CONFIG = {
            storageKey: 'unlockProgressData', // Key used for LocalStorage

            // The tasks the user needs to fulfill
            tasks: [
                {
                    id: 'yt-sub',
                    icon: 'youtube', // Lucide icon name
                    title: 'Subscribe on YouTube',
                    desc: 'Subscribe to my channel for more free content',
                    url: 'https://youtube.com/@yourchannel?sub_confirmation=1',
                    btnText: 'Subscribe'
                },
                {
                    id: 'yt-like',
                    icon: 'thumbs-up',
                    title: 'Like Video',
                    desc: 'Leave a like on the featured video',
                    url: 'https://youtube.com/watch?v=YOUR_VIDEO_ID',
                    btnText: 'Like'
                },
                {
                    id: 'discord',
                    icon: 'message-square',
                    title: 'Join Discord',
                    desc: 'Join our community server',
                    url: 'https://discord.gg/YOUR_INVITE_CODE',
                    btnText: 'Join'
                },
                {
                    id: 'insta',
                    icon: 'instagram',
                    title: 'Follow Instagram',
                    desc: 'Follow updates on Instagram',
                    url: 'https://instagram.com/your_username',
                    btnText: 'Follow'
                }
            ]
        };

        // State tracking
        let completedTasks = [];

        // Application Initialization
        function init() {
            // Render the icons
            lucide.createIcons();

            // Check if user has returning progress
            const stored = localStorage.getItem(CONFIG.storageKey);
            if (stored) {
                completedTasks = JSON.parse(stored);
            }

            renderTasks();
            updateProgress();
        }

        // Render Action Cards to DOM
        function renderTasks() {
            const container = document.getElementById('tasks-container');
            container.innerHTML = '';

            CONFIG.tasks.forEach(task => {
                const isCompleted = completedTasks.includes(task.id);

                const card = document.createElement('div');
                card.className = `card ${isCompleted ? 'completed' : ''}`;
                card.id = `card-${task.id}`;

                let iconHtml = `<i data-lucide="${task.icon}"></i>`;
                if (isCompleted) {
                    // Checkmark animation when complete
                    iconHtml = `<i data-lucide="check" class="check-anim"></i>`;
                }

                card.innerHTML = `
                    <div class="card-icon">
                        ${iconHtml}
                    </div>
                    <div class="card-content">
                        <h3>${task.title}</h3>
                        <p>${task.desc}</p>
                    </div>
                    <a href="#" class="action-btn" onclick="handleTaskClick(event, '${task.id}', '${task.url}')">
                        ${isCompleted ? 'Completed' : task.btnText}
                    </a>
                `;

                container.appendChild(card);
            });

            // Re-render lucide icons inside generated DOM elements
            lucide.createIcons();
        }

        // Action when user clicks a task button
        function handleTaskClick(e, taskId, url) {
            e.preventDefault();

            if (completedTasks.includes(taskId)) return;

            // Open the target link in a new tab
            window.open(url, '_blank');

            // Mark this specific ID natively as completed
            completedTasks.push(taskId);

            // Save state to local storage to prevent loss on reload
            localStorage.setItem(CONFIG.storageKey, JSON.stringify(completedTasks));

            // Refresh UI
            renderTasks();
            updateProgress();
        }

        // Handle calculation and animation of the progress bar
        function updateProgress() {
            const total = CONFIG.tasks.length;
            const completed = completedTasks.length;
            const percentage = Math.round((completed / total) * 100);

            // Animate bar CSS width
            document.getElementById('progress-bar').style.width = `${percentage}%`;
            document.getElementById('progress-text').innerText = `${percentage}%`;

            // If completely done, unlock features
            if (percentage === 100) {
                unlockDownload();
            }
        }

        // Fire achievement and grant access
        function unlockDownload() {
            const btn = document.getElementById('download-btn');
            const lockIcon = document.getElementById('lock-icon');
            const btnText = document.getElementById('btn-text');
            const msg = document.getElementById('success-msg');
            const linksBox = document.getElementById('links-box');

            // Set button to active properties
            btn.classList.add('unlocked');
            btn.removeAttribute('disabled');
            lockIcon.setAttribute('data-lucide', 'unlock');
            btnText.innerText = 'Download Now';

            // Display success boxes
            msg.style.display = 'block';
            linksBox.style.display = 'block';

            lucide.createIcons();

            // Link click trigger handler (Directly redirects)
            btn.onclick = () => {
                const finalLink = document.getElementById('final-link').value;
                if (finalLink) window.open(finalLink, '_blank');
            };

            triggerConfetti();
        }

        // Extra eye-candy 🎉
        function triggerConfetti() {
            var duration = 3 * 1000;
            var end = Date.now() + duration;

            (function frame() {
                // Shoot confetti from left
                confetti({
                    particleCount: 5,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 },
                    colors: ['#00f0ff', '#00ff88', '#ffffff']
                });
                // Shoot confetti from right
                confetti({
                    particleCount: 5,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 },
                    colors: ['#00f0ff', '#00ff88', '#ffffff']
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());
        }

        // Testing helper
        function resetProgress() {
            localStorage.removeItem(CONFIG.storageKey);
            completedTasks = [];

            document.getElementById('progress-bar').style.width = `0%`;
            document.getElementById('progress-text').innerText = `0%`;

            const btn = document.getElementById('download-btn');
            btn.classList.remove('unlocked');
            btn.setAttribute('disabled', 'true');
            document.getElementById('lock-icon').setAttribute('data-lucide', 'lock');
            document.getElementById('btn-text').innerText = 'Download Locked';

            document.getElementById('success-msg').style.display = 'none';
            document.getElementById('links-box').style.display = 'none';
            btn.onclick = null;

            renderTasks();
            lucide.createIcons();
        }

        // Kickoff script execution
        window.onload = init;
    </script>
</body>

</html>
