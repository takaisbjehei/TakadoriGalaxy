<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Live Party Hub</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!-- Login UI -->
    <div id="login-screen" class="overlay active">
        <div class="glass-panel">
            <h1 class="gradient-text">TAKA'S World</h1>

            <!-- Returning User Flow -->
            <div id="returning-user-flow" class="hidden">
                <p>Welcome back, <strong id="saved-name-display" style="color: var(--primary);">Player</strong>!</p>
                <button id="btn-continue" class="glow-button" style="margin-bottom: 10px; width: 100%;">Continue as
                    <span id="saved-name-btn"></span></button>
                <button id="btn-change-name" class="outline-button" style="width: 100%;">Use a different name</button>
            </div>

            <!-- New User Flow -->
            <div id="new-user-flow">
                <p>Enter your name to join the live server</p>
                <form id="join-form">
                    <input type="text" id="player-name" placeholder="Your Name" required maxlength="15">
                    <div class="color-picker" id="color-picker">
                        <!-- Color swatches generated by JS -->
                    </div>

                    <p style="font-size: 0.9rem; margin-top: 10px; margin-bottom: 5px;">Choose your Avatar:</p>
                    <div class="model-picker" id="model-picker">
                        <div class="model-option selected" data-model="capsule">Capsule</div>
                        <div class="model-option" data-model="box">Box</div>
                        <div class="model-option" data-model="sphere">Sphere</div>
                    </div>

                    <button type="submit" class="glow-button" style="margin-top: 10px;">Enter World</button>
                </form>
            </div>

            <div id="loading" class="hidden">Connecting to remote servers...</div>
        </div>
    </div>

    <!-- Game UI -->
    <div id="game-ui" class="hidden overlay-ui">
        <div class="top-left">
            <div class="player-info">
                <span id="ui-player-name">Name</span>
                <span class="ping-dot"></span>
            </div>
            <div class="controls-hint hidden-on-mobile">
                <kbd>Welcome</kbd><kbd>TO</kbd><kbd>MY</kbd><kbd>WORLD</kbd>
            </div>
            <button id="mic-toggle-btn" class="glow-button" style="margin-top: 10px; font-size: 0.8rem; padding: 5px 10px; display: none;">Mute Mic</button>
        </div>
        <div class="top-right">
            <div class="player-count">
                Players Online: <span id="online-count">1</span>
            </div>
        </div>

        <!-- Chat UI -->
        <div id="chat-history" class="chat-history hidden-on-mobile">
            <div class="chat-history-content" id="chat-history-content">
                <!-- Chat messages appended here -->
            </div>
        </div>

        <div class="chat-container">
            <form id="chat-form">
                <input type="text" id="chat-input" placeholder="Say something... (Press '/' to type)" autocomplete="off"
                    maxlength="100">
                <button type="submit" id="chat-send">Send</button>
            </form>
        </div>

        <!-- Mobile Joystick Container -->
        <div id="joystick-zone"></div>
    </div>

    <!-- UI Overlay for Floating HTML tags (Chat Bubbles) -->
    <div id="labels-container"></div>

    <!-- 3D Canvas Container -->
    <div id="canvas-container"></div>

    <!-- Scripts -->
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- NippleJS for Mobile Controls -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
    <script type="module" src="app.js"></script>
</body>

</html>
