<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Live Party Hub</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Login UI -->
    <div id="login-screen" class="overlay active">
        <div class="glass-panel">
            <h1 class="gradient-text">Neon Worlds</h1>
            <p>Enter your name to join the live server</p>
            <form id="join-form">
                <input type="text" id="player-name" placeholder="Your Name" required maxlength="15">
                <div class="color-picker" id="color-picker">
                    <!-- Color swatches generated by JS -->
                </div>
                <button type="submit" class="glow-button">Enter World</button>
            </form>
            <div id="loading" class="hidden">Connecting to remote servers...</div>
        </div>
    </div>

    <!-- Game UI -->
    <div id="game-ui" class="hidden overlay-ui">
        <div class="top-left">
            <div class="player-info">
                <span id="ui-player-name">Name</span>
                <span class="ping-dot"></span>
            </div>
            <div class="controls-hint">
                <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> to move
            </div>
        </div>
        <div class="top-right">
            <div class="player-count">
                Players Online: <span id="online-count">1</span>
            </div>
        </div>
    </div>

    <!-- 3D Canvas Container -->
    <div id="canvas-container"></div>

    <!-- Scripts -->
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
    <script type="module" src="app.js"></script>
</body>
</html>
