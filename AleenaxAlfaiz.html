<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Aleena 💕</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Playfair+Display:ital,wght@0,400;1,400&family=Dancing+Script:wght@600&display=swap" rel="stylesheet">
<style>
  :root {
    --rose: #d4849a;
    --deep: #1a0a10;
    --blush: #f5e0e8;
    --gold: #c9a96e;
    --cream: #fdf6f0;
    --mauve: #8b4a60;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--deep);
    color: var(--cream);
    font-family: 'Cormorant Garamond', serif;
    overflow-x: hidden;
    cursor: default;
  }

  /* Floating petals */
  .petal {
    position: fixed;
    font-size: 12px;
    opacity: 0;
    animation: fall linear infinite;
    pointer-events: none;
    z-index: 0;
  }
  @keyframes fall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 0.7; }
    100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
  }

  /* HERO */
  .hero {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    padding: 40px 20px;
  }

  .hero-bg {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 30% 40%, #3d1525 0%, #1a0a10 60%),
                radial-gradient(ellipse at 70% 60%, #2a1020 0%, transparent 50%);
  }

  .hero-bg::after {
    content: '';
    position: absolute;
    inset: 0;
    background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23d4849a' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  }

  .hero-content {
    position: relative;
    z-index: 2;
    text-align: center;
    animation: fadeUp 1.5s ease both;
  }

  .crown { font-size: 2rem; margin-bottom: 10px; animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.1); } }

  .for-text {
    font-size: 0.85rem;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--gold);
    font-family: 'Cormorant Garamond', serif;
    opacity: 0.8;
  }

  .hero-name {
    font-family: 'Dancing Script', cursive;
    font-size: clamp(4rem, 15vw, 9rem);
    color: transparent;
    background: linear-gradient(135deg, #f5c6d8, #d4849a, #c9a96e, #f5c6d8);
    -webkit-background-clip: text;
    background-clip: text;
    background-size: 200% 200%;
    animation: shimmer 4s ease infinite;
    line-height: 1;
    margin: 5px 0 15px;
    text-shadow: none;
    filter: drop-shadow(0 0 30px rgba(212,132,154,0.4));
  }

  @keyframes shimmer {
    0%,100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }

  .hero-sub {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: clamp(1rem, 3vw, 1.4rem);
    color: rgba(245,224,232,0.7);
    letter-spacing: 0.05em;
  }

  .scroll-hint {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    opacity: 0.5;
    animation: bounce 2s ease-in-out infinite;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
  }
  .scroll-hint span { font-size: 1.2rem; }
  @keyframes bounce { 0%,100% { transform: translateX(-50%) translateY(0); } 50% { transform: translateX(-50%) translateY(8px); } }

  /* COUPLE SECTION */
  .couple-section {
    padding: 80px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
    background: linear-gradient(180deg, var(--deep) 0%, #200e18 50%, var(--deep) 100%);
  }

  .couple-frame {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
    max-width: 700px;
    width: 100%;
  }

  .couple-photo {
    position: relative;
    border-radius: 50%;
    overflow: hidden;
    border: 3px solid var(--gold);
    box-shadow: 0 0 40px rgba(212,132,154,0.3), 0 0 80px rgba(201,169,110,0.1);
    animation: fadeUp 1s ease both;
  }
  .couple-photo.big { width: 200px; height: 200px; animation-delay: 0.2s; }
  .couple-photo.small { width: 160px; height: 160px; animation-delay: 0.5s; border-color: var(--rose); }

  .couple-photo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top center;
  }

  .heart-divider {
    font-size: 2.5rem;
    animation: heartbeat 1.2s ease-in-out infinite;
    color: var(--rose);
    filter: drop-shadow(0 0 10px rgba(212,132,154,0.6));
  }
  @keyframes heartbeat {
    0%,100% { transform: scale(1); }
    14% { transform: scale(1.3); }
    28% { transform: scale(1); }
    42% { transform: scale(1.2); }
    70% { transform: scale(1); }
  }

  .couple-names {
    font-family: 'Dancing Script', cursive;
    font-size: clamp(1.5rem, 5vw, 2.5rem);
    color: var(--gold);
    margin-top: 20px;
    text-align: center;
  }

  /* GALLERY */
  .gallery-section {
    padding: 60px 20px;
    max-width: 1100px;
    margin: 0 auto;
  }

  .section-title {
    text-align: center;
    margin-bottom: 50px;
  }
  .section-title h2 {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: clamp(2rem, 5vw, 3rem);
    color: var(--rose);
    margin-bottom: 8px;
  }
  .section-title .line {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 15px;
    color: rgba(201,169,110,0.5);
    font-size: 0.7rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
  }
  .section-title .line::before, .section-title .line::after {
    content: '';
    width: 60px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  .gallery-grid {
    display: grid;
    grid-template-columns: repeat(12, 1fr);
    grid-template-rows: auto;
    gap: 12px;
  }

  .gcard {
    position: relative;
    overflow: hidden;
    border-radius: 4px;
    cursor: pointer;
    background: #2a1020;
  }

  .gcard:nth-child(1) { grid-column: 1 / 6; grid-row: 1; }
  .gcard:nth-child(2) { grid-column: 6 / 13; grid-row: 1; }
  .gcard:nth-child(3) { grid-column: 1 / 5; grid-row: 2; }
  .gcard:nth-child(4) { grid-column: 5 / 9; grid-row: 2; }
  .gcard:nth-child(5) { grid-column: 9 / 13; grid-row: 2; }

  .gcard img {
    width: 100%;
    height: 100%;
    min-height: 280px;
    object-fit: cover;
    object-position: top center;
    display: block;
    transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94), filter 0.4s ease;
    filter: brightness(0.9) saturate(0.9);
  }

  .gcard:nth-child(1) img { min-height: 350px; }
  .gcard:nth-child(2) img { min-height: 350px; }

  .gcard::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(0deg, rgba(26,10,16,0.5) 0%, transparent 40%);
    transition: opacity 0.4s;
  }

  .gcard:hover img {
    transform: scale(1.06);
    filter: brightness(1.05) saturate(1.1);
  }
  .gcard:hover::after { opacity: 0.3; }

  .gcard-label {
    position: absolute;
    bottom: 15px;
    left: 15px;
    z-index: 2;
    font-family: 'Dancing Script', cursive;
    font-size: 1.1rem;
    color: rgba(245,224,232,0.8);
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.4s ease;
  }
  .gcard:hover .gcard-label { opacity: 1; transform: translateY(0); }

  @media (max-width: 600px) {
    .gallery-grid { grid-template-columns: 1fr 1fr; }
    .gcard:nth-child(1) { grid-column: 1 / 3; }
    .gcard:nth-child(2) { grid-column: 1 / 3; }
    .gcard:nth-child(3) { grid-column: 1 / 2; }
    .gcard:nth-child(4) { grid-column: 2 / 3; }
    .gcard:nth-child(5) { grid-column: 1 / 3; }
  }

  /* LOVE LETTER */
  .letter-section {
    padding: 80px 20px;
    background: linear-gradient(180deg, var(--deep) 0%, #160810 50%, var(--deep) 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .letter-card {
    max-width: 620px;
    width: 100%;
    background: rgba(212,132,154,0.05);
    border: 1px solid rgba(201,169,110,0.2);
    border-radius: 2px;
    padding: 50px 40px;
    position: relative;
    backdrop-filter: blur(10px);
  }

  .letter-card::before, .letter-card::after {
    content: '❧';
    position: absolute;
    font-size: 1.5rem;
    color: var(--gold);
    opacity: 0.4;
  }
  .letter-card::before { top: 15px; left: 20px; }
  .letter-card::after { bottom: 15px; right: 20px; transform: scaleX(-1); }

  .letter-date {
    font-size: 0.75rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--gold);
    opacity: 0.6;
    margin-bottom: 25px;
    text-align: right;
  }

  .letter-body {
    font-size: clamp(1rem, 2.5vw, 1.15rem);
    line-height: 1.9;
    color: rgba(245,224,232,0.85);
    font-style: italic;
  }

  .letter-body p { margin-bottom: 18px; }

  .letter-sig {
    margin-top: 30px;
    text-align: right;
    font-family: 'Dancing Script', cursive;
    font-size: 1.8rem;
    color: var(--rose);
    filter: drop-shadow(0 0 8px rgba(212,132,154,0.3));
  }

  /* REASONS */
  .reasons-section {
    padding: 80px 20px;
    max-width: 900px;
    margin: 0 auto;
  }

  .reasons-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 20px;
    margin-top: 50px;
  }

  .reason-card {
    background: rgba(212,132,154,0.04);
    border: 1px solid rgba(212,132,154,0.15);
    border-radius: 2px;
    padding: 30px 25px;
    transition: all 0.4s ease;
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.8s ease both;
  }

  .reason-card::before {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--rose), transparent);
    transform: scaleX(0);
    transition: transform 0.4s ease;
  }

  .reason-card:hover { background: rgba(212,132,154,0.08); transform: translateY(-4px); }
  .reason-card:hover::before { transform: scaleX(1); }

  .reason-icon { font-size: 1.8rem; margin-bottom: 12px; }
  .reason-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    color: var(--gold);
    margin-bottom: 8px;
  }
  .reason-text {
    font-size: 0.95rem;
    line-height: 1.7;
    color: rgba(245,224,232,0.65);
  }

  /* FOOTER */
  .footer {
    text-align: center;
    padding: 60px 20px;
    background: #0f0508;
    position: relative;
    overflow: hidden;
  }

  .footer::before {
    content: '';
    position: absolute;
    top: 0; left: 50%; transform: translateX(-50%);
    width: 200px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  .footer-heart {
    font-size: 3rem;
    animation: heartbeat 1.2s ease-in-out infinite;
    display: block;
    margin-bottom: 15px;
    filter: drop-shadow(0 0 20px rgba(212,132,154,0.6));
  }

  .footer-text {
    font-family: 'Dancing Script', cursive;
    font-size: clamp(1.5rem, 4vw, 2rem);
    color: var(--gold);
    margin-bottom: 10px;
  }

  .footer-sub {
    font-size: 0.8rem;
    letter-spacing: 0.2em;
    color: rgba(212,132,154,0.4);
    text-transform: uppercase;
  }

  /* Animations */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .fade-in {
    opacity: 0;
    transform: translateY(30px);
    transition: opacity 0.8s ease, transform 0.8s ease;
  }
  .fade-in.visible { opacity: 1; transform: none; }

  /* Lightbox */
  .lightbox {
    position: fixed;
    inset: 0;
    background: rgba(10,3,7,0.95);
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease;
    backdrop-filter: blur(10px);
  }
  .lightbox.open { opacity: 1; pointer-events: all; }
  .lightbox img {
    max-width: 90vw;
    max-height: 88vh;
    object-fit: contain;
    border-radius: 4px;
    box-shadow: 0 0 60px rgba(212,132,154,0.2);
    transform: scale(0.95);
    transition: transform 0.4s ease;
  }
  .lightbox.open img { transform: scale(1); }
  .lightbox-close {
    position: fixed;
    top: 20px; right: 25px;
    font-size: 2rem;
    color: rgba(245,224,232,0.6);
    cursor: pointer;
    transition: color 0.2s;
    background: none; border: none;
    line-height: 1;
  }
  .lightbox-close:hover { color: var(--rose); }
</style>
</head>

  <div class="hero-bg"></div>
  <div class="hero-content">

    <p class="for-text">This page is made for</p>
    <h1 class="hero-name">Aleena</h1>
    <p class="hero-sub">My world, my heart, my everything</p>
  </div>
  <div class="scroll-hint">
    <span>↓</span>
    scroll

</section>
